<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online — Пиксельная MMORPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c12;
            font-family: 'Courier New', 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .game-fullscreen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1a1c1a;
        }

        .top-bar {
            background: #1e1a12;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #d4b87a;
            flex-shrink: 0;
            z-index: 10;
        }

        .player-stats {
            display: flex;
            gap: 20px;
            background: #2a2418;
            padding: 6px 24px;
            border-radius: 30px;
        }
        .player-stats div {
            color: #ffdd99;
            font-size: 14px;
            font-weight: bold;
        }
        .player-stats span {
            color: #ffaa66;
        }

        .game-area {
            flex: 1;
            position: relative;
            background: #2a382a;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            cursor: crosshair;
        }

        .bottom-bar {
            background: #1e1a12;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-top: 3px solid #d4b87a;
            flex-shrink: 0;
        }

        .class-buttons { display: flex; gap: 12px; }

        .pixel-btn {
            background: #3a2a1a;
            border: none;
            padding: 10px 24px;
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
            color: #e6d5a8;
            cursor: pointer;
            border-bottom: 3px solid #7a5a3a;
            border-radius: 12px;
            transition: 0.05s linear;
        }
        .pixel-btn.active {
            background: #5a4a2a;
            border-bottom-color: #ffcc66;
            color: #ffdd99;
            box-shadow: 0 0 8px #ffaa66;
        }
        .pixel-btn:active { transform: translateY(2px); }

        .toast {
            position: fixed;
            top: 90px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #d4b87a;
            border-radius: 12px;
            padding: 10px 20px;
            color: #ffdd99;
            font-size: 13px;
            z-index: 200;
            animation: slideIn 0.3s ease-out;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .damage-number {
            position: absolute;
            font-weight: bold;
            font-size: 20px;
            font-family: monospace;
            text-shadow: 2px 2px 0 black;
            pointer-events: none;
            z-index: 50;
            animation: floatUp 0.7s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
        }

        .blood-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #ff4444, #aa2222);
            border-radius: 50%;
            pointer-events: none;
            z-index: 40;
            animation: bloodSplat 0.4s ease-out forwards;
        }
        @keyframes bloodSplat {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 300;
        }
        .modal-card {
            background: #2a2418;
            border: 3px solid #d4b87a;
            padding: 24px;
            max-width: 380px;
            width: 90%;
            border-radius: 20px;
            color: #ffdd99;
            text-align: center;
        }
        .modal-title { font-size: 24px; margin-bottom: 20px; color: #ffcc66; }
        .close-btn {
            background: #3a2a1a;
            padding: 12px;
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            border-radius: 30px;
        }
        input {
            background: #0a0a0a;
            border: 2px solid #d4b87a;
            padding: 12px;
            width: 100%;
            color: #ffdd99;
            font-family: monospace;
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
            border-radius: 12px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: #1e1a12;
            margin: 5px 0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div id="loginModal" class="modal" style="display: flex;">
    <div class="modal-card">
        <div class="modal-title">⚔️ RUCOY ONLINE ⚔️</div>
        <input type="text" id="playerName" placeholder="Имя героя" maxlength="16" value="Suguru">
        <button class="pixel-btn" style="width:100%; margin-top:10px;" onclick="login()">🎮 ВОЙТИ</button>
        <button class="pixel-btn" style="width:100%; margin-top:8px; background:#3a2a1a;" onclick="guestLogin()">👤 ГОСТЬ</button>
        <div style="font-size: 11px; margin-top: 12px;">💾 Автосохранение | Пиксельный мир</div>
    </div>
</div>

<div class="game-fullscreen" style="display: none;" id="gameContainer">
    <div class="top-bar">
        <div class="player-stats">
            <div>👑 <span id="playerNameDisplay">Suguru</span></div>
            <div>✨ Lv.<span id="playerLevelDisplay">1</span></div>
            <div>❤️ <span id="playerHpDisplay">100/100</span></div>
            <div>⚔️ <span id="playerDmgDisplay">25-35</span></div>
            <div>🛡️ <span id="playerDefDisplay">15</span></div>
            <div>💰 <span id="playerGoldDisplay">520</span></div>
        </div>
        <div class="save-status" id="saveStatus">💾 Сохранено</div>
    </div>

    <div class="game-area" id="gameArea">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="bottom-bar">
        <div class="class-buttons">
            <button class="pixel-btn active" id="btnSword">⚔️ РЫЦАРЬ</button>
            <button class="pixel-btn" id="btnBow">🏹 ЛУЧНИК</button>
            <button class="pixel-btn" id="btnStaff">🔮 МАГ</button>
        </div>
        <div>
            <button class="pixel-btn" id="healBtn">💊 ЛЕЧЕНИЕ (40💰)</button>
            <button class="pixel-btn" id="saveBtn">💾 СОХРАНИТЬ</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-card">
        <div class="modal-title">⚙️ СТАТИСТИКА</div>
        <div id="settingsContent"></div>
        <div class="close-btn" onclick="closeSettings()">ЗАКРЫТЬ</div>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    let TILE = 48;
    let MAP_W = 25;
    let MAP_H = 19;
    let cameraX = 0, cameraY = 0;
    let mapTiles = [];
    let playerDir = 0;
    let attackTimer = null;
    let currentTarget = null;
    let highlightX = null, highlightY = null;
    let lastFrameTime = 0;
    
    // ========== ИГРОК ==========
    let player = {
        id: null, name: "Suguru", level: 1, exp: 0, hp: 100, maxHp: 100,
        dmgMin: 25, dmgMax: 35, defense: 15, gold: 520,
        x: 12, y: 9, targetX: 12, targetY: 9, moving: false,
        skillSword: 1, skillBow: 1, skillStaff: 1, skillDefense: 1,
        class: "sword"
    };
    
    let monsters = [];
    let nextMonsterId = 1;
    let monsterAttackTimers = new Map();
    
    // ========== МОНСТРЫ ==========
    const monsterTypes = [
        { name: "🐀 КРЫСА", lvl:1, hp:55, dmgMin:7, dmgMax:14, exp:15, gold:18, def:2, color:"#8e6a4a", speed:0.22 },
        { name: "🐺 ВОЛК", lvl:2, hp:85, dmgMin:11, dmgMax:21, exp:28, gold:32, def:4, color:"#6a6a5a", speed:0.28 },
        { name: "🧟 ЗОМБИ", lvl:3, hp:120, dmgMin:15, dmgMax:28, exp:45, gold:55, def:7, color:"#6a7a4a", speed:0.18 },
        { name: "👹 ОРК", lvl:4, hp:170, dmgMin:20, dmgMax:38, exp:70, gold:85, def:10, color:"#7a5a3a", speed:0.24 },
        { name: "🐉 ДРАКОН", lvl:5, hp:250, dmgMin:28, dmgMax:52, exp:110, gold:130, def:14, color:"#9a5a3a", speed:0.20 }
    ];
    
    // ========== ОТРИСОВКА ==========
    function drawTile(x, y, type) {
        const px = x * TILE;
        const py = y * TILE;
        if (type === 0) {
            ctx.fillStyle = "#3f7840";
            ctx.fillRect(px, py, TILE, TILE);
            ctx.fillStyle = "#2a572a";
            for (let i = 0; i < 2; i++) ctx.fillRect(px + 10 + i*14, py + 14, 5, 5);
            ctx.fillStyle = "#5f9e4a";
            for (let i = 0; i < 2; i++) ctx.fillRect(px + 14 + i*14, py + 28, 4, 4);
        } else if (type === 2) {
            ctx.fillStyle = "#5e4a2a";
            ctx.fillRect(px, py, TILE, TILE);
            ctx.fillStyle = "#3a2a1a";
            ctx.fillRect(px+10, py+10, 28, 28);
        } else {
            ctx.fillStyle = "#5a5a5a";
            ctx.fillRect(px, py, TILE, TILE);
        }
        ctx.strokeStyle = "#2e2e1e";
        ctx.strokeRect(px, py, TILE, TILE);
    }
    
    function drawHero(x, y, dir, className, isMoving) {
        const px = x * TILE;
        const py = y * TILE;
        const offX = (TILE - 36) / 2;
        const offY = (TILE - 36) / 2;
        
        // Броня по классу
        if (className === "sword") ctx.fillStyle = "#6e8e5a";
        else if (className === "bow") ctx.fillStyle = "#8aae6a";
        else ctx.fillStyle = "#6a8aae";
        ctx.fillRect(px+offX+8, py+offY+16, 20, 16);
        
        // Штаны
        ctx.fillStyle = "#6a5a3a";
        ctx.fillRect(px+offX+10, py+offY+32, 7, 8);
        ctx.fillRect(px+offX+19, py+offY+32, 7, 8);
        
        // Голова
        ctx.fillStyle = "#f5d4a4";
        ctx.fillRect(px+offX+12, py+offY+4, 12, 14);
        
        // Глаза
        ctx.fillStyle = "#000";
        if (dir === 0) {
            ctx.fillRect(px+offX+14, py+offY+10, 3, 3);
            ctx.fillRect(px+offX+19, py+offY+10, 3, 3);
        } else if (dir === 1) {
            ctx.fillRect(px+offX+12, py+offY+10, 3, 3);
            ctx.fillRect(px+offX+17, py+offY+10, 3, 3);
        } else if (dir === 2) {
            ctx.fillRect(px+offX+16, py+offY+10, 3, 3);
            ctx.fillRect(px+offX+21, py+offY+10, 3, 3);
        } else {
            ctx.fillRect(px+offX+14, py+offY+8, 3, 3);
            ctx.fillRect(px+offX+19, py+offY+8, 3, 3);
        }
        
        // Волосы
        ctx.fillStyle = "#3a2a1a";
        ctx.fillRect(px+offX+11, py+offY+2, 14, 6);
        
        // Оружие
        ctx.fillStyle = "#c9b06a";
        if (className === "sword") {
            ctx.fillRect(px+offX+28, py+offY+22, 8, 4);
            ctx.fillRect(px+offX+32, py+offY+20, 3, 12);
        } else if (className === "bow") {
            ctx.fillRect(px+offX+26, py+offY+26, 12, 3);
            ctx.fillRect(px+offX+30, py+offY+22, 3, 10);
        } else {
            ctx.fillStyle = "#aa88ff";
            ctx.fillRect(px+offX+26, py+offY+22, 10, 6);
            for(let i=0;i<4;i++) ctx.fillRect(px+offX+28+i*2, py+offY+16, 2, 8);
        }
        
        if (isMoving && (Date.now() % 400 < 200)) {
            ctx.fillStyle = "#ba9a6a";
            ctx.fillRect(px+offX+10, py+offY+38, 7, 5);
            ctx.fillRect(px+offX+19, py+offY+38, 7, 5);
        }
    }
    
    function drawMonster(x, y, monster, isTarget) {
        const px = x * TILE;
        const py = y * TILE;
        const off = (TILE-34)/2;
        
        ctx.fillStyle = monster.color;
        ctx.fillRect(px+off+6, py+off+12, 22, 20);
        ctx.fillRect(px+off+11, py+off+4, 12, 10);
        ctx.fillStyle = "#000";
        ctx.fillRect(px+off+12, py+off+14, 3, 3);
        ctx.fillRect(px+off+19, py+off+14, 3, 3);
        
        if (isTarget) {
            ctx.strokeStyle = "#ff4444";
            ctx.lineWidth = 3;
            ctx.strokeRect(px+2, py+2, TILE-4, TILE-4);
        }
        
        let percent = monster.hp / monster.maxHp;
        ctx.fillStyle = "#331a0a";
        ctx.fillRect(px+4, py-10, TILE-8, 6);
        ctx.fillStyle = "#c44";
        ctx.fillRect(px+4, py-10, (TILE-8) * percent, 6);
        
        ctx.fillStyle = "#ffaa66";
        ctx.font = "bold 10px monospace";
        ctx.fillText(`Lv.${monster.lvl}`, px+6, py-2);
        ctx.fillStyle = "#ffcc88";
        ctx.font = "9px monospace";
        ctx.fillText(monster.name, px+5, py+38);
    }
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    function generateMap() {
        for (let y = 0; y < MAP_H; y++) {
            mapTiles[y] = [];
            for (let x = 0; x < MAP_W; x++) {
                if (x === 0 || y === 0 || x === MAP_W-1 || y === MAP_H-1) mapTiles[y][x] = 3;
                else if (Math.random() < 0.04) mapTiles[y][x] = 2;
                else mapTiles[y][x] = 0;
            }
        }
    }
    
    function canWalk(tx, ty) {
        if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return false;
        return mapTiles[ty][tx] !== 2 && mapTiles[ty][tx] !== 3;
    }
    
    function getDamage() {
        let mult = 1;
        if (player.class === "sword") mult = 1 + (player.skillSword-1)*0.05;
        if (player.class === "bow") mult = 1 + (player.skillBow-1)*0.05;
        if (player.class === "staff") mult = 1 + (player.skillStaff-1)*0.05;
        let min = Math.floor(player.dmgMin * mult);
        let max = Math.floor(player.dmgMax * mult);
        return Math.floor(Math.random()*(max-min+1)+min);
    }
    
    function getDefense() {
        return Math.floor(player.defense * (1 + (player.skillDefense-1)*0.03));
    }
    
    function attackRange() {
        if (player.class === "sword") return 1.8;
        return 4.5;
    }
    
    function showDamage(x, y, dmg, crit, isMonster=false) {
        let div = document.createElement('div');
        div.className = 'damage-number';
        div.textContent = crit ? `💥 ${dmg}!` : `-${dmg}`;
        if (crit) div.style.color = '#ffaa44';
        if (isMonster) div.style.color = '#ff8866';
        div.style.left = (x-20)+'px';
        div.style.top = (y-25)+'px';
        document.getElementById('gameArea').appendChild(div);
        setTimeout(()=>div.remove(),700);
        
        // Эффект крови
        let blood = document.createElement('div');
        blood.className = 'blood-effect';
        blood.style.left = (x-15)+'px';
        blood.style.top = (y-15)+'px';
        document.getElementById('gameArea').appendChild(blood);
        setTimeout(()=>blood.remove(),400);
    }
    
    function showToast(msg, isError=false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        if (isError) toast.style.borderColor = '#ff8866';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function spawnMonster() {
        if (monsters.length >= 10) return;
        let lvlRange = Math.min(5, player.level + 2);
        let possible = monsterTypes.filter(m => m.lvl <= lvlRange);
        if (possible.length === 0) possible = monsterTypes;
        let t = possible[Math.floor(Math.random()*possible.length)];
        let x, y;
        do {
            x = 1 + Math.floor(Math.random()*(MAP_W-2));
            y = 1 + Math.floor(Math.random()*(MAP_H-2));
        } while (!canWalk(x,y) || (Math.abs(x-player.x)+Math.abs(y-player.y) < 2));
        monsters.push({ ...t, id: nextMonsterId++, hp: t.hp, maxHp: t.hp, x, y });
    }
    
    function moveMonsters() {
        for (let m of monsters) {
            let dx = player.x - m.x;
            let dy = player.y - m.y;
            let dist = Math.abs(dx) + Math.abs(dy);
            
            if (dist <= 3.5 && dist > 0.5) {
                let moveSpeed = m.speed || 0.18;
                let nx = m.x, ny = m.y;
                
                if (Math.abs(dx) > Math.abs(dy)) {
                    nx += dx > 0 ? moveSpeed : -moveSpeed;
                } else {
                    ny += dy > 0 ? moveSpeed : -moveSpeed;
                }
                
                let tx = Math.round(nx);
                let ty = Math.round(ny);
                
                if (canWalk(tx, ty) && !(tx === player.x && ty === player.y)) {
                    m.x = nx;
                    m.y = ny;
                }
            }
        }
    }
    
    function startMonsterAttack(monster) {
        if (monsterAttackTimers.has(monster.id)) return;
        
        let timer = setInterval(() => {
            if (!monsters.includes(monster) || monster.hp <= 0 || player.hp <= 0) {
                clearInterval(timer);
                monsterAttackTimers.delete(monster.id);
                return;
            }
            
            let dist = Math.abs(player.x - monster.x) + Math.abs(player.y - monster.y);
            if (dist <= 1.5) {
                let dmg = Math.floor(Math.random()*(monster.dmgMax-monster.dmgMin+1)+monster.dmgMin);
                let finalDmg = Math.max(1, dmg - getDefense());
                player.hp -= finalDmg;
                showDamage(player.x*TILE+TILE/2, player.y*TILE+20, finalDmg, false, true);
                
                if (player.hp <= 0) {
                    player.hp = player.maxHp;
                    player.gold = Math.max(0, player.gold - 50);
                    player.x = 12; player.y = 9;
                    player.targetX = 12; player.targetY = 9;
                    player.moving = false;
                    showToast("💀 ВЫ ПАЛИ! -50💰", true);
                }
                updateUI();
            }
        }, 1500);
        
        monsterAttackTimers.set(monster.id, timer);
    }
    
    function startAutoAttack(monster) {
        if (attackTimer) clearInterval(attackTimer);
        currentTarget = monster;
        
        attackTimer = setInterval(() => {
            if (!currentTarget || currentTarget.hp <= 0 || !monsters.includes(currentTarget)) {
                stopAutoAttack();
                return;
            }
            
            let dist = Math.abs(player.x - currentTarget.x) + Math.abs(player.y - currentTarget.y);
            if (dist > attackRange()) {
                stopAutoAttack();
                showToast(`❌ Слишком далеко от ${currentTarget.name}`, true);
                return;
            }
            
            let dmg = getDamage();
            let crit = Math.random() < 0.1;
            if (crit) dmg = Math.floor(dmg * 1.8);
            let final = Math.max(1, dmg - currentTarget.def);
            currentTarget.hp -= final;
            
            showDamage(currentTarget.x*TILE+TILE/2, currentTarget.y*TILE+20, final, crit);
            
            if (currentTarget.hp <= 0) {
                let expGain = currentTarget.exp;
                let goldGain = currentTarget.gold;
                showToast(`🎉 +${expGain} EXP, +${goldGain}💰`);
                player.exp += expGain;
                player.gold += goldGain;
                
                if (player.class === "sword") player.skillSword = Math.min(100, player.skillSword+1);
                if (player.class === "bow") player.skillBow = Math.min(100, player.skillBow+1);
                if (player.class === "staff") player.skillStaff = Math.min(100, player.skillStaff+1);
                player.skillDefense = Math.min(100, player.skillDefense+0.5);
                
                levelUp();
                monsters = monsters.filter(m => m !== currentTarget);
                monsterAttackTimers.delete(currentTarget.id);
                spawnMonster();
                stopAutoAttack();
                updateUI();
                saveGame();
            }
            updateUI();
        }, 1500);
    }
    
    function stopAutoAttack() {
        if (attackTimer) {
            clearInterval(attackTimer);
            attackTimer = null;
        }
        currentTarget = null;
    }
    
    function levelUp() {
        let need = player.level * 80;
        while (player.exp >= need) {
            player.exp -= need;
            player.level++;
            player.maxHp += 18;
            player.hp = player.maxHp;
            player.dmgMin += 5;
            player.dmgMax += 5;
            player.defense += 3;
            showToast(`✨✨✨ УРОВЕНЬ ${player.level}! ✨✨✨`);
            need = player.level * 80;
        }
        updateUI();
    }
    
    function heal() {
        if (player.gold < 40) { showToast(`❌ Нужно 40 золота`, true); return; }
        if (player.hp >= player.maxHp) { showToast(`❤️ Здоровье полное`); return; }
        player.gold -= 40;
        player.hp = player.maxHp;
        showToast(`💊 Здоровье восстановлено!`);
        updateUI();
        saveGame();
    }
    
    function moveToTarget() {
        if (!player.moving) return;
        let dx = player.targetX - player.x;
        let dy = player.targetY - player.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < 0.08) {
            player.moving = false;
            player.x = player.targetX;
            player.y = player.targetY;
            return;
        }
        
        let step = Math.min(0.1, dist);
        let angle = Math.atan2(dy, dx);
        let newX = player.x + Math.cos(angle) * step;
        let newY = player.y + Math.sin(angle) * step;
        
        let tx = Math.round(newX);
        let ty = Math.round(newY);
        
        if (canWalk(tx, ty) || (tx === player.targetX && ty === player.targetY)) {
            player.x = newX;
            player.y = newY;
            if (Math.abs(dx) > Math.abs(dy)) {
                playerDir = dx > 0 ? 2 : 1;
            } else {
                playerDir = dy > 0 ? 0 : 3;
            }
        } else {
            player.moving = false;
        }
    }
    
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        let cx, cy;
        if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        else { cx = e.clientX; cy = e.clientY; }
        
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        let mx = (cx - rect.left) * scaleX;
        let my = (cy - rect.top) * scaleY;
        let tx = Math.floor(mx / TILE);
        let ty = Math.floor(my / TILE);
        
        if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return;
        
        highlightX = tx;
        highlightY = ty;
        
        let monster = monsters.find(m => m.x === tx && m.y === ty);
        if (monster) {
            if (currentTarget === monster) {
                stopAutoAttack();
                showToast(`⚔️ Прекращена атака ${monster.name}`);
            } else {
                stopAutoAttack();
                startAutoAttack(monster);
                showToast(`🎯 Цель: ${monster.name} (Lv.${monster.lvl})`);
            }
            drawGame();
            return;
        }
        
        if (canWalk(tx, ty)) {
            player.targetX = tx;
            player.targetY = ty;
            player.moving = true;
        }
        drawGame();
    }
    
    function updateUI() {
        document.getElementById('playerNameDisplay').innerText = player.name;
        document.getElementById('playerLevelDisplay').innerText = player.level;
        document.getElementById('playerHpDisplay').innerText = `${Math.ceil(player.hp)}/${player.maxHp}`;
        document.getElementById('playerDmgDisplay').innerText = `${player.dmgMin}-${player.dmgMax}`;
        document.getElementById('playerDefDisplay').innerText = getDefense();
        document.getElementById('playerGoldDisplay').innerText = player.gold;
    }
    
    function drawGame() {
        if (!canvas.width || !canvas.height) return;
        
        let viewW = Math.ceil(canvas.width / TILE);
        let viewH = Math.ceil(canvas.height / TILE);
        
        cameraX = Math.min(Math.max(player.x - viewW/2, 0), MAP_W - viewW);
        cameraY = Math.min(Math.max(player.y - viewH/2, 0), MAP_H - viewH);
        
        let startX = Math.floor(cameraX);
        let startY = Math.floor(cameraY);
        
        for (let y = 0; y < viewH; y++) {
            for (let x = 0; x < viewW; x++) {
                let mapX = startX + x;
                let mapY = startY + y;
                if (mapX >= 0 && mapX < MAP_W && mapY >= 0 && mapY < MAP_H) {
                    drawTile(x, y, mapTiles[mapY][mapX]);
                } else {
                    ctx.fillStyle = "#2a382a";
                    ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
                }
            }
        }
        
        if (highlightX !== null && highlightY !== null && canWalk(highlightX, highlightY)) {
            let sx = highlightX - startX;
            let sy = highlightY - startY;
            if (sx >= 0 && sx < viewW && sy >= 0 && sy < viewH) {
                ctx.fillStyle = "rgba(255, 215, 0, 0.35)";
                ctx.fillRect(sx*TILE, sy*TILE, TILE, TILE);
                ctx.strokeStyle = "#ffdd88";
                ctx.lineWidth = 2;
                ctx.strokeRect(sx*TILE+3, sy*TILE+3, TILE-6, TILE-6);
            }
        }
        
        monsters.forEach(m => {
            let sx = m.x - startX;
            let sy = m.y - startY;
            if (sx >= 0 && sx < viewW && sy >= 0 && sy < viewH) {
                drawMonster(sx, sy, m, currentTarget === m);
            }
        });
        
        let px = player.x - startX;
        let py = player.y - startY;
        if (px >= 0 && px < viewW && py >= 0 && py < viewH) {
            drawHero(px, py, playerDir, player.class, player.moving);
            
            let hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = "#331a0a";
            ctx.fillRect(px*TILE+10, py*TILE-12, 36, 5);
            ctx.fillStyle = "#44aa44";
            ctx.fillRect(px*TILE+10, py*TILE-12, 36 * hpPercent, 5);
            
            ctx.fillStyle = "#ffdd99";
            ctx.font = "bold 12px monospace";
            ctx.fillText(`${player.name} Lv.${player.level}`, px*TILE+8, py*TILE-18);
        }
    }
    
    function resizeCanvas() {
        const area = document.querySelector('.game-area');
        canvas.width = area.clientWidth;
        canvas.height = area.clientHeight;
        TILE = Math.min(52, Math.floor(canvas.width / 18));
        drawGame();
    }
    
    function saveGame() {
        if (!player.id) return;
        let data = {
            player: {
                name: player.name, level: player.level, exp: player.exp,
                hp: player.hp, maxHp: player.maxHp, dmgMin: player.dmgMin, dmgMax: player.dmgMax,
                defense: player.defense, gold: player.gold, x: player.x, y: player.y,
                skillSword: player.skillSword, skillBow: player.skillBow,
                skillStaff: player.skillStaff, skillDefense: player.skillDefense, class: player.class
            },
            monsters: monsters.map(m => ({ name: m.name, lvl: m.lvl, hp: m.hp, maxHp: m.maxHp,
                dmgMin: m.dmgMin, dmgMax: m.dmgMax, exp: m.exp, gold: m.gold, def: m.def,
                color: m.color, x: m.x, y: m.y, speed: m.speed }))
        };
        localStorage.setItem(`rucoy_${player.id}`, JSON.stringify(data));
        let st = document.getElementById('saveStatus');
        st.innerText = "💾 Сохранено!";
        setTimeout(()=> st.innerText = "💾 Сохранено", 2000);
    }
    
    function loadGame(id) {
        let raw = localStorage.getItem(`rucoy_${id}`);
        if (!raw) return false;
        try {
            let data = JSON.parse(raw);
            Object.assign(player, data.player);
            monsters = data.monsters.map(m => ({ ...m, hp: m.hp, maxHp: m.maxHp }));
            updateUI();
            showToast(`💾 Загружен прогресс: ${player.name}, уровень ${player.level}`);
            return true;
        } catch(e) { return false; }
    }
    
    function changeClass(c) {
        player.class = c;
        document.querySelectorAll('.class-buttons .pixel-btn').forEach(btn=>btn.classList.remove('active'));
        if(c === 'sword') document.getElementById('btnSword').classList.add('active');
        if(c === 'bow') document.getElementById('btnBow').classList.add('active');
        if(c === 'staff') document.getElementById('btnStaff').classList.add('active');
        showToast(`⚔️ Класс сменён на ${c === 'sword' ? 'РЫЦАРЬ' : c === 'bow' ? 'ЛУЧНИК' : 'МАГ'}`);
        saveGame();
    }
    
    function openSettings() {
        let content = document.getElementById('settingsContent');
        content.innerHTML = `
            <div class="stat-row"><span>👤 Имя:</span><span>${player.name}</span></div>
            <div class="stat-row"><span>✨ Уровень:</span><span>${player.level}</span></div>
            <div class="stat-row"><span>❤️ HP:</span><span>${Math.ceil(player.hp)}/${player.maxHp}</span></div>
            <div class="stat-row"><span>⚔️ Урон:</span><span>${player.dmgMin}-${player.dmgMax}</span></div>
            <div class="stat-row"><span>🛡️ Защита:</span><span>${getDefense()}</span></div>
            <div class="stat-row"><span>💰 Золото:</span><span>${player.gold}</span></div>
            <div class="stat-row"><span>⚔️ Мечник:</span><span>${player.skillSword} ур.</span></div>
            <div class="stat-row"><span>🏹 Лучник:</span><span>${player.skillBow} ур.</span></div>
            <div class="stat-row"><span>🔮 Маг:</span><span>${player.skillStaff} ур.</span></div>
            <div class="stat-row"><span>🛡️ Защита:</span><span>${player.skillDefense} ур.</span></div>
        `;
        document.getElementById('settingsModal').style.display = 'flex';
    }
    
    function closeSettings() {
        document.getElementById('settingsModal').style.display = 'none';
    }
    
    function gameLoop() {
        moveToTarget();
        moveMonsters();
        for (let m of monsters) {
            let dist = Math.abs(player.x - m.x) + Math.abs(player.y - m.y);
            if (dist <= 1.5) startMonsterAttack(m);
        }
        drawGame();
        requestAnimationFrame(gameLoop);
    }
    
    function startGame() {
        generateMap();
        for(let i = 0; i < 6; i++) spawnMonster();
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleCanvasClick(e); });
        window.addEventListener('resize', resizeCanvas);
        
        document.getElementById('btnSword').onclick = ()=>changeClass('sword');
        document.getElementById('btnBow').onclick = ()=>changeClass('bow');
        document.getElementById('btnStaff').onclick = ()=>changeClass('staff');
        document.getElementById('healBtn').onclick = heal;
        document.getElementById('saveBtn').onclick = saveGame;
        document.getElementById('playerNameDisplay').onclick = openSettings;
        
        setInterval(()=> { if(monsters.length < 7) spawnMonster(); }, 7000);
        setInterval(()=> saveGame(), 30000);
        window.addEventListener('beforeunload', ()=>saveGame());
        
        resizeCanvas();
        gameLoop();
        updateUI();
        showToast(`⚔️ Добро пожаловать, ${player.name}! Уровень ${player.level}`);
    }
    
    function login() {
        let name = document.getElementById('playerName').value.trim();
        if (!name) { alert("Введите имя!"); return; }
        player.name = name;
        player.id = name.toLowerCase().replace(/[^a-z0-9]/g,'_');
        player.x = 12; player.y = 9;
        player.targetX = 12; player.targetY = 9;
        player.moving = false;
        player.hp = player.maxHp;
        monsters = [];
        
        if (!loadGame(player.id)) {
            showToast(`✨ Добро пожаловать, ${player.name}!`);
            for(let i = 0; i < 5; i++) spawnMonster();
        }
        
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'flex';
        startGame();
    }
    
    function guestLogin() {
        player.name = "Гость_" + Math.floor(Math.random()*9999);
        player.id = "guest_"+Date.now();
        player.x = 12; player.y = 9;
        player.targetX = 12; player.targetY = 9;
        player.moving = false;
        player.hp = player.maxHp;
        monsters = [];
        
        showToast(`👤 Игра как гость: ${player.name}`);
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'flex';
        startGame();
    }
</script>
</body>
