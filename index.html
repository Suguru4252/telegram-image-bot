<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rucoy Online - Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c15;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'Monaco', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            background: #1a1f2e;
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* UI Панели */
        .ui-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #ffd966;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            z-index: 10;
            pointer-events: auto;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            color: #ffd966;
            font-weight: bold;
            font-size: 14px;
        }

        .hp-bar-container {
            width: 200px;
            height: 20px;
            background: #3a1f1f;
            border-radius: 10px;
            overflow: hidden;
        }

        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #d44a4a, #ff6a6a);
            width: 100%;
            transition: width 0.2s ease;
        }

        .xp-bar-container {
            width: 250px;
            height: 12px;
            background: #2a2a2a;
            border-radius: 6px;
            overflow: hidden;
        }

        .xp-bar {
            height: 100%;
            background: linear-gradient(90deg, #6a9eff, #3a6eff);
            width: 0%;
            transition: width 0.2s ease;
        }

        button {
            background: #4a3e2a;
            border: none;
            color: #ffd966;
            padding: 6px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 12px;
        }

        button:active {
            transform: scale(0.95);
        }

        .inventory-slot {
            background: rgba(0,0,0,0.7);
            border: 2px solid #ffd966;
            border-radius: 8px;
            width: 50px;
            height: 50px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 3px;
            cursor: pointer;
            font-size: 20px;
            position: relative;
        }

        .inventory-slot:hover {
            background: rgba(255,217,102,0.3);
        }

        .equipped {
            border-color: #6aff6a;
            box-shadow: 0 0 10px #6aff6a;
        }

        #inventoryPanel {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #ffd966;
            width: 280px;
            display: none;
            z-index: 20;
        }

        .damage-number {
            position: absolute;
            font-weight: bold;
            font-size: 20px;
            color: #ffaa44;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        .log-message {
            position: absolute;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffd966;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            animation: fadeOut 2s forwards;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-panel">
        <div class="stats">
            <div class="stat-card">⚔️ Lv.<span id="level">1</span></div>
            <div class="stat-card">🛡️ <span id="className">Рыцарь</span></div>
            <div class="hp-bar-container">
                <div class="hp-bar" id="hpBar"></div>
            </div>
            <div class="stat-card">❤️ <span id="hpText">120/120</span></div>
        </div>
        <div class="xp-bar-container">
            <div class="xp-bar" id="xpBar"></div>
        </div>
        <div>
            <button id="toggleInventory">🎒 Инвентарь</button>
            <button id="healBtn">💊 Лечение</button>
            <button id="spellBtn">✨ Спецудар</button>
        </div>
    </div>
    
    <div id="inventoryPanel">
        <h4 style="color:#ffd966; margin-bottom:10px;">Инвентарь</h4>
        <div id="inventorySlots"></div>
        <div style="margin-top:15px;">
            <h5 style="color:#ffd966;">Экипировка</h5>
            <div id="equipmentSlots"></div>
        </div>
        <button id="closeInventory" style="margin-top:10px;">Закрыть</button>
    </div>
</div>

<script>
    // ==================== ПОЛНОЦЕННАЯ 2D MMORPG В СТИЛЕ RUCOY ====================
    
    // Настройки мира
    const TILE_SIZE = 48;
    let canvas = document.getElementById('gameCanvas');
    let ctx = canvas.getContext('2d');
    
    // Размеры мира (огромная карта)
    const WORLD_WIDTH = 50;
    const WORLD_HEIGHT = 50;
    let cameraX = 0, cameraY = 0;
    
    // Генерация мира (леса, пустыни, горы)
    let worldMap = [];
    let worldType = [];
    
    function generateWorld() {
        for(let y = 0; y < WORLD_HEIGHT; y++) {
            worldMap[y] = [];
            worldType[y] = [];
            for(let x = 0; x < WORLD_WIDTH; x++) {
                // Типы местности: 0-трава, 1-лес, 2-пустыня, 3-горы, 4-вода
                let noise = Math.sin(x * 0.3) * Math.cos(y * 0.3) + Math.random() * 0.3;
                if(noise < -0.5) worldType[y][x] = 4; // вода
                else if(noise < -0.2) worldType[y][x] = 0; // трава
                else if(noise < 0.2) worldType[y][x] = 1; // лес
                else if(noise < 0.5) worldType[y][x] = 2; // пустыня
                else worldType[y][x] = 3; // горы
                
                worldMap[y][x] = worldType[y][x] === 3 || worldType[y][x] === 4 ? 1 : 0; // проходимость
            }
        }
        // Делаем края непроходимыми
        for(let i = 0; i < WORLD_WIDTH; i++) {
            worldMap[0][i] = 1;
            worldMap[WORLD_HEIGHT-1][i] = 1;
            worldMap[i][0] = 1;
            worldMap[i][WORLD_WIDTH-1] = 1;
        }
    }
    
    // Игрок
    let player = {
        x: 25, y: 25,
        targetX: 25, targetY: 25,
        level: 1,
        xp: 0,
        maxHp: 120,
        hp: 120,
        baseAttack: 22,
        defense: 12,
        className: 'knight',
        speed: 4,
        weapon: { name: 'Меч новичка', damage: 8, type: 'sword' },
        armor: { name: 'Кожаный доспех', defense: 5 },
        inventory: [],
        moving: false,
        animationFrame: 0
    };
    
    // Оружие и броня
    const weapons = {
        sword: { name: 'Меч', damage: 12, price: 500 },
        bow: { name: 'Лук', damage: 10, price: 450 },
        staff: { name: 'Посох', damage: 14, price: 550 },
        greatsword: { name: 'Двуручный меч', damage: 20, price: 1200 },
        crossbow: { name: 'Арбалет', damage: 18, price: 1100 },
        wand: { name: 'Волшебная палочка', damage: 22, price: 1300 }
    };
    
    // Монстры с разными типами и лутом
    let monsters = [];
    
    function spawnMonsters() {
        const monsterTypes = [
            { name: 'Гоблин', hp: 45, attack: 16, defense: 3, xp: 35, color: '#6b8c42', size: 36, level: 1, drop: { gold: 15, item: null } },
            { name: 'Скелет', hp: 75, attack: 22, defense: 5, xp: 60, color: '#bdb28c', size: 38, level: 2, drop: { gold: 25, item: 'sword' } },
            { name: 'Орк', hp: 110, attack: 28, defense: 8, xp: 95, color: '#7a6a4a', size: 42, level: 3, drop: { gold: 40, item: 'greatsword' } },
            { name: 'Минотавр', hp: 180, attack: 38, defense: 12, xp: 150, color: '#9b5e2c', size: 46, level: 4, drop: { gold: 70, item: 'bow' } },
            { name: 'Дракон', hp: 350, attack: 55, defense: 20, xp: 300, color: '#aa4a2a', size: 52, level: 6, drop: { gold: 150, item: 'wand' } }
        ];
        
        for(let i = 0; i < 35; i++) {
            let type = monsterTypes[Math.floor(Math.random() * monsterTypes.length)];
            let x, y, valid;
            do {
                valid = true;
                x = 3 + Math.random() * (WORLD_WIDTH - 6);
                y = 3 + Math.random() * (WORLD_HEIGHT - 6);
                if(worldMap[Math.floor(y)][Math.floor(x)] === 1) valid = false;
                for(let m of monsters) {
                    if(Math.abs(m.x - x) < 2 && Math.abs(m.y - y) < 2) valid = false;
                }
                if(Math.abs(player.x - x) < 3) valid = false;
            } while(!valid);
            
            monsters.push({
                id: i,
                ...type,
                x: x, y: y,
                currentHp: type.hp,
                aggro: false,
                attackCooldown: 0,
                targetX: x, targetY: y
            });
        }
    }
    
    // Плавное движение
    let lastTime = 0;
    let playerMoveProgress = 1;
    
    function updateMovement(deltaTime) {
        if(!player.moving) {
            if(player.x !== player.targetX || player.y !== player.targetY) {
                player.moving = true;
                playerMoveProgress = 0;
            }
        }
        
        if(player.moving) {
            let speed = player.speed * deltaTime;
            playerMoveProgress += speed;
            
            if(playerMoveProgress >= 1) {
                player.x = player.targetX;
                player.y = player.targetY;
                player.moving = false;
                playerMoveProgress = 1;
                checkMonsterAggro();
            }
        }
        
        // Движение монстров
        for(let monster of monsters) {
            if(monster.currentHp <= 0) continue;
            
            if(monster.aggro && monster.attackCooldown <= 0) {
                let dx = player.x - monster.x;
                let dy = player.y - monster.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if(dist > 1.2) {
                    let moveX = Math.sign(dx);
                    let moveY = Math.sign(dy);
                    let newX = monster.x + moveX * 0.1;
                    let newY = monster.y + moveY * 0.1;
                    
                    if(worldMap[Math.floor(newY)] && worldMap[Math.floor(newY)][Math.floor(newX)] === 0) {
                        monster.x = newX;
                        monster.y = newY;
                    }
                } else if(dist <= 1.2 && monster.attackCooldown <= 0) {
                    // Атака монстра
                    let dmg = Math.max(5, monster.attack - player.defense + Math.random() * 10);
                    player.hp -= dmg;
                    showDamage(monster.x * TILE_SIZE, monster.y * TILE_SIZE, dmg, '#ff4444');
                    addLog(`${monster.name} атакует! -${Math.floor(dmg)} HP`);
                    monster.attackCooldown = 1.0;
                    updateUI();
                    
                    if(player.hp <= 0) {
                        playerDeath();
                    }
                }
            }
            
            if(monster.attackCooldown > 0) {
                monster.attackCooldown -= deltaTime;
            }
        }
        
        player.animationFrame += deltaTime * 8;
    }
    
    function checkMonsterAggro() {
        for(let monster of monsters) {
            if(monster.currentHp <= 0) continue;
            let dx = player.x - monster.x;
            let dy = player.y - monster.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 5) {
                monster.aggro = true;
            }
            if(dist > 8) {
                monster.aggro = false;
            }
        }
    }
    
    function playerDeath() {
        addLog('💀 ВЫ ПОГИБЛИ! Возрождение через 3 секунды...');
        player.hp = 0;
        setTimeout(() => {
            player.x = 25; player.y = 25;
            player.targetX = 25; player.targetY = 25;
            player.hp = player.maxHp;
            player.moving = false;
            addLog('🌟 Вы возродились в городе');
            updateUI();
        }, 3000);
    }
    
    function attackMonster(monster) {
        if(Date.now() - lastAttackTime < 600) {
            addLog('Подождите, атака перезаряжается!');
            return;
        }
        
        let damage = player.baseAttack + player.weapon.damage - monster.defense + Math.random() * 15;
        damage = Math.max(8, Math.floor(damage));
        monster.currentHp -= damage;
        monster.aggro = true;
        lastAttackTime = Date.now();
        
        showDamage(monster.x * TILE_SIZE, monster.y * TILE_SIZE, damage, '#ffaa44');
        addLog(`⚔️ Вы нанесли ${damage} урона ${monster.name}`);
        
        if(monster.currentHp <= 0) {
            let xpGain = monster.xp;
            player.xp += xpGain;
            addLog(`🏆 Убит ${monster.name}! +${xpGain} XP!`);
            
            // Дроп предметов
            if(monster.drop && monster.drop.item && Math.random() < 0.3) {
                let item = { ...weapons[monster.drop.item] };
                player.inventory.push(item);
                addLog(`🎁 Вы получили: ${item.name}!`);
            }
            
            checkLevelUp();
            respawnMonster(monster);
        }
        
        updateUI();
    }
    
    let lastAttackTime = 0;
    
    function respawnMonster(monster) {
        setTimeout(() => {
            monster.currentHp = monster.hp;
            monster.aggro = false;
            monster.attackCooldown = 0;
            // Новые координаты
            let x, y;
            do {
                x = 3 + Math.random() * (WORLD_WIDTH - 6);
                y = 3 + Math.random() * (WORLD_HEIGHT - 6);
            } while(worldMap[Math.floor(y)][Math.floor(x)] === 1);
            monster.x = x;
            monster.y = y;
            addLog(`🌀 ${monster.name} возродился`);
        }, 7000);
    }
    
    function checkLevelUp() {
        let needXP = 100 + (player.level - 1) * 50;
        while(player.xp >= needXP) {
            player.xp -= needXP;
            player.level++;
            player.maxHp += 25;
            player.hp = player.maxHp;
            player.baseAttack += 5;
            player.defense += 2;
            addLog(`✨ УРОВЕНЬ ${player.level}! Характеристики увеличены! ✨`);
            needXP = 100 + (player.level - 1) * 50;
        }
        updateUI();
    }
    
    function useSpell() {
        if(Date.now() - lastSpellTime < 3000) {
            addLog('Способность перезаряжается!');
            return;
        }
        
        if(player.className === 'knight') {
            // Удар по области
            let hitCount = 0;
            for(let m of monsters) {
                let dist = Math.abs(m.x - player.x) + Math.abs(m.y - player.y);
                if(dist < 2.5 && m.currentHp > 0) {
                    let dmg = player.baseAttack + 25;
                    m.currentHp -= dmg;
                    showDamage(m.x * TILE_SIZE, m.y * TILE_SIZE, dmg, '#ff8844');
                    hitCount++;
                    if(m.currentHp <= 0) {
                        player.xp += m.xp;
                        checkLevelUp();
                    }
                }
            }
            player.hp = Math.min(player.maxHp, player.hp + 40);
            addLog(`🛡️ Рыцарский удар! Лечение +40 HP`);
        } else if(player.className === 'archer') {
            // Дальний выстрел
            let closest = null;
            let minDist = Infinity;
            for(let m of monsters) {
                if(m.currentHp > 0) {
                    let dist = Math.abs(m.x - player.x) + Math.abs(m.y - player.y);
                    if(dist < minDist) {
                        minDist = dist;
                        closest = m;
                    }
                }
            }
            if(closest) {
                let dmg = player.baseAttack + 30;
                closest.currentHp -= dmg;
                showDamage(closest.x * TILE_SIZE, closest.y * TILE_SIZE, dmg, '#88ff88');
                addLog(`🏹 Снайперский выстрел! -${dmg}`);
            }
        } else if(player.className === 'mage') {
            // Огненный шар по области
            for(let m of monsters) {
                let dist = Math.abs(m.x - player.x) + Math.abs(m.y - player.y);
                if(dist < 3 && m.currentHp > 0) {
                    let dmg = player.baseAttack + 20;
                    m.currentHp -= dmg;
                    showDamage(m.x * TILE_SIZE, m.y * TILE_SIZE, dmg, '#ff6666');
                }
            }
            addLog(`🔥 Огненный шар!`);
        }
        
        lastSpellTime = Date.now();
        updateUI();
    }
    
    let lastSpellTime = 0;
    
    function heal() {
        let healAmount = Math.floor(player.maxHp * 0.35);
        player.hp = Math.min(player.maxHp, player.hp + healAmount);
        addLog(`💊 Вылечено +${healAmount} HP`);
        updateUI();
    }
    
    function showDamage(x, y, damage, color) {
        let div = document.createElement('div');
        div.className = 'damage-number';
        div.textContent = `-${Math.floor(damage)}`;
        div.style.left = (x - cameraX + 20) + 'px';
        div.style.top = (y - cameraY + 20) + 'px';
        div.style.color = color;
        document.getElementById('gameContainer').appendChild(div);
        setTimeout(() => div.remove(), 800);
    }
    
    function addLog(msg) {
        let logDiv = document.createElement('div');
        logDiv.className = 'log-message';
        logDiv.textContent = msg;
        document.getElementById('gameContainer').appendChild(logDiv);
        setTimeout(() => logDiv.remove(), 2500);
    }
    
    function updateUI() {
        document.getElementById('level').innerText = player.level;
        let hpPercent = (player.hp / player.maxHp) * 100;
        document.getElementById('hpBar').style.width = hpPercent + '%';
        document.getElementById('hpText').innerHTML = `${Math.floor(player.hp)}/${player.maxHp}`;
        
        let needXP = 100 + (player.level - 1) * 50;
        let xpPercent = (player.xp / needXP) * 100;
        document.getElementById('xpBar').style.width = xpPercent + '%';
        
        let classNames = { knight: 'Рыцарь', archer: 'Лучник', mage: 'Маг' };
        document.getElementById('className').innerText = classNames[player.className];
    }
    
    // Отрисовка мира
    function draw() {
        // Камера следует за игроком
        cameraX = player.x * TILE_SIZE - canvas.width / 2;
        cameraY = player.y * TILE_SIZE - canvas.height / 2;
        cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH * TILE_SIZE - canvas.width));
        cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT * TILE_SIZE - canvas.height));
        
        // Рисуем мир
        let startX = Math.floor(cameraX / TILE_SIZE);
        let startY = Math.floor(cameraY / TILE_SIZE);
        let endX = Math.min(startX + Math.ceil(canvas.width / TILE_SIZE) + 2, WORLD_WIDTH);
        let endY = Math.min(startY + Math.ceil(canvas.height / TILE_SIZE) + 2, WORLD_HEIGHT);
        
        for(let y = startY; y < endY; y++) {
            for(let x = startX; x < endX; x++) {
                let screenX = x * TILE_SIZE - cameraX;
                let screenY = y * TILE_SIZE - cameraY;
                
                // Цвета для разных типов местности
                if(worldType[y][x] === 0) ctx.fillStyle = '#5c6e4a';
                else if(worldType[y][x] === 1) ctx.fillStyle = '#4a6e3a';
                else if(worldType[y][x] === 2) ctx.fillStyle = '#c9b86a';
                else if(worldType[y][x] === 3) ctx.fillStyle = '#8a7a5a';
                else ctx.fillStyle = '#4a6a8a';
                
                ctx.fillRect(screenX, screenY, TILE_SIZE - 1, TILE_SIZE - 1);
                
                // Детали
                ctx.fillStyle = '#2c3524';
                ctx.fillRect(screenX + 4, screenY + 4, TILE_SIZE - 9, TILE_SIZE - 9);
            }
        }
        
        // Рисуем монстров
        for(let monster of monsters) {
            if(monster.currentHp <= 0) continue;
            let screenX = monster.x * TILE_SIZE - cameraX;
            let screenY = monster.y * TILE_SIZE - cameraY;
            
            ctx.fillStyle = monster.color;
            ctx.fillRect(screenX + 6, screenY + 6, TILE_SIZE - 12, TILE_SIZE - 12);
            
            // Глаза
            ctx.fillStyle = '#000';
            ctx.fillRect(screenX + 14, screenY + 18, 6, 6);
            ctx.fillRect(screenX + TILE_SIZE - 22, screenY + 18, 6, 6);
            
            // HP бар
            let hpPercent = monster.currentHp / monster.hp;
            ctx.fillStyle = '#a13333';
            ctx.fillRect(screenX + 6, screenY - 8, TILE_SIZE - 12, 6);
            ctx.fillStyle = '#d65c5c';
            ctx.fillRect(screenX + 6, screenY - 8, (TILE_SIZE - 12) * hpPercent, 6);
            
            // Имя
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px monospace';
            ctx.fillText(monster.name, screenX + 8, screenY - 2);
            
            // Агро индикатор
            if(monster.aggro) {
                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 2;
                ctx.strokeRect(screenX + 4, screenY + 4, TILE_SIZE - 8, TILE_SIZE - 8);
            }
        }
        
        // Рисуем игрока с анимацией
        let playerScreenX = player.x * TILE_SIZE - cameraX;
        let playerScreenY = player.y * TILE_SIZE - cameraY;
        
        // Анимация движения
        let bobY = Math.sin(player.animationFrame) * 2;
        
        ctx.fillStyle = '#3a6ea5';
        ctx.fillRect(playerScreenX + 8, playerScreenY + 8 + bobY, TILE_SIZE - 16, TILE_SIZE - 16);
        
        // Голова
        ctx.fillStyle = '#f9c87a';
        ctx.beginPath();
        ctx.arc(playerScreenX + TILE_SIZE/2, playerScreenY + TILE_SIZE/2 - 6 + bobY, 10, 0, Math.PI*2);
        ctx.fill();
        
        // Шлем/оружие по классу
        if(player.className === 'knight') {
            ctx.fillStyle = '#ccccaa';
            ctx.fillRect(playerScreenX + 12, playerScreenY + 6 + bobY, 24, 8);
            ctx.fillStyle = '#aaaaff';
            ctx.fillRect(playerScreenX + TILE_SIZE - 12, playerScreenY + TILE_SIZE/2 + bobY, 12, 5);
        } else if(player.className === 'archer') {
            ctx.fillStyle = '#6f9e4f';
            ctx.fillRect(playerScreenX + 10, playerScreenY + 8 + bobY, 28, 6);
            ctx.fillStyle = '#ccaa66';
            ctx.fillRect(playerScreenX + TILE_SIZE - 14, playerScreenY + TILE_SIZE/2 - 2 + bobY, 14, 4);
        } else {
            ctx.fillStyle = '#a367c2';
            ctx.fillRect(playerScreenX + 12, playerScreenY + 6 + bobY, 24, 8);
            ctx.fillStyle = '#ff88aa';
            ctx.beginPath();
            ctx.moveTo(playerScreenX + TILE_SIZE - 12, playerScreenY + TILE_SIZE/2 + bobY);
            ctx.lineTo(playerScreenX + TILE_SIZE - 2, playerScreenY + TILE_SIZE/2 - 4 + bobY);
            ctx.lineTo(playerScreenX + TILE_SIZE - 12, playerScreenY + TILE_SIZE/2 - 8 + bobY);
            ctx.fill();
        }
        
        // HP бар игрока над головой
        let hpPercent = player.hp / player.maxHp;
        ctx.fillStyle = '#a13333';
        ctx.fillRect(playerScreenX + 8, playerScreenY - 8, TILE_SIZE - 16, 5);
        ctx.fillStyle = '#d65c5c';
        ctx.fillRect(playerScreenX + 8, playerScreenY - 8, (TILE_SIZE - 16) * hpPercent, 5);
    }
    
    // Обработка кликов для движения и атаки
    function handleCanvasClick(e) {
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        let clickX = (e.clientX - rect.left) * scaleX;
        let clickY = (e.clientY - rect.top) * scaleY;
        
        let worldX = (clickX + cameraX) / TILE_SIZE;
        let worldY = (clickY + cameraY) / TILE_SIZE;
        
        // Проверяем, не кликнули ли по монстру
        let clickedMonster = null;
        for(let monster of monsters) {
            if(monster.currentHp <= 0) continue;
            let dx = Math.abs(worldX - monster.x);
            let dy = Math.abs(worldY - monster.y);
            if(dx < 0.6 && dy < 0.6) {
                clickedMonster = monster;
                break;
            }
        }
        
        if(clickedMonster) {
            attackMonster(clickedMonster);
        } else {
            // Движение
            let targetX = Math.floor(worldX);
            let targetY = Math.floor(worldY);
            if(targetX >= 0 && targetX < WORLD_WIDTH && targetY >= 0 && targetY < WORLD_HEIGHT && worldMap[targetY][targetX] === 0) {
                player.targetX = targetX;
                player.targetY = targetY;
            }
        }
    }
    
    // Инвентарь
    function updateInventoryUI() {
        let container = document.getElementById('inventorySlots');
        container.innerHTML = '';
        player.inventory.forEach((item, index) => {
            let slot = document.createElement('div');
            slot.className = 'inventory-slot';
            slot.innerHTML = item.type === 'sword' ? '⚔️' : (item.type === 'bow' ? '🏹' : '🔮');
            slot.innerHTML += `<span style="font-size:10px;">${item.name}</span>`;
            slot.onclick = () => equipItem(index);
            container.appendChild(slot);
        });
        
        let equipContainer = document.getElementById('equipmentSlots');
        equipContainer.innerHTML = '';
        let weaponSlot = document.createElement('div');
        weaponSlot.className = 'inventory-slot equipped';
        weaponSlot.innerHTML = '⚔️<br>' + (player.weapon ? player.weapon.name : 'Пусто');
        equipContainer.appendChild(weaponSlot);
    }
    
    function equipItem(index) {
        let item = player.inventory[index];
        if(item.type === 'sword' || item.type === 'bow' || item.type === 'staff' || item.type === 'wand') {
            player.weapon = item;
            player.inventory.splice(index, 1);
            addLog(`Экипировано: ${item.name}`);
            updateInventoryUI();
        }
    }
    
    // Смена класса
    function setClass(className) {
        player.className = className;
        addLog(`Смена класса на ${className.toUpperCase()}`);
        updateUI();
    }
    
    // Инициализация
    function init() {
        canvas.width = 1200;
        canvas.height = 700;
        generateWorld();
        spawnMonsters();
        
        // Стартовые предметы
        player.inventory.push({ ...weapons.sword, type: 'sword' });
        player.weapon = { ...weapons.sword, type: 'sword' };
        
        updateUI();
        updateInventoryUI();
        
        // Обработчики
        canvas.addEventListener('click', handleCanvasClick);
        document.getElementById('toggleInventory').onclick = () => {
            let panel = document.getElementById('inventoryPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            updateInventoryUI();
        };
        document.getElementById('closeInventory').onclick = () => {
            document.getElementById('inventoryPanel').style.display = 'none';
        };
        document.getElementById('healBtn').onclick = () => heal();
        document.getElementById('spellBtn').onclick = () => useSpell();
        
        // Классы через кнопки
        let btns = [
            { class: 'knight', btn: document.getElementById('classKnight') },
            { class: 'archer', btn: document.getElementById('classArcher') },
            { class: 'mage', btn: document.getElementById('classMage') }
        ];
        
        // Добавляем кнопки классов в UI
        let classDiv = document.createElement('div');
        classDiv.style.position = 'absolute';
        classDiv.style.top = '20px';
        classDiv.style.left = '20px';
        classDiv.style.background = 'rgba(0,0,0,0.7)';
        classDiv.style.padding = '8px';
        classDiv.style.borderRadius = '8px';
        classDiv.innerHTML = `
            <button id="classKnight" style="margin:3px;">🛡️ Рыцарь</button>
            <button id="classArcher" style="margin:3px;">🏹 Лучник</button>
            <button id="classMage" style="margin:3px;">🔮 Маг</button>
        `;
        document.getElementById('gameContainer').appendChild(classDiv);
        
        document.getElementById('classKnight').onclick = () => setClass('knight');
        document.getElementById('classArcher').onclick = () => setClass('archer');
        document.getElementById('classMage').onclick = () => setClass('mage');
        
        // Игровой цикл
        let lastTimestamp = 0;
        function gameLoop(timestamp) {
            let deltaTime = Math.min(0.033, (timestamp - lastTimestamp) / 1000);
            lastTimestamp = timestamp;
            updateMovement(deltaTime);
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        requestAnimationFrame(gameLoop);
    }
    
    init();
</script>
</body>
</html>
