<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rucoy Online - 2D MMORPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c15;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Панели */
        .top-panel {
            background: #1a1a1a;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffaa33;
            flex-wrap: wrap;
            gap: 8px;
            position: relative;
            z-index: 5;
        }

        .stat {
            background: #2a2a2a;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
            color: #ffaa66;
        }

        .stat span {
            color: white;
            font-weight: bold;
        }

        /* Canvas игрового поля */
        .game-area {
            position: relative;
            flex: 1;
            background: #2a4a2a;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* Нижняя панель */
        .bottom-panel {
            background: #1a1a1a;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #ffaa33;
            flex-wrap: wrap;
            gap: 8px;
        }

        .class-selector {
            display: flex;
            gap: 8px;
        }

        .class-btn {
            background: #2a2a2a;
            border: none;
            padding: 8px 16px;
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
            color: #ffaa66;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.1s;
        }

        .class-btn.active {
            background: #ffaa33;
            color: #1a1a1a;
            box-shadow: 0 0 10px #ffaa33;
        }

        .class-btn:active {
            transform: scale(0.95);
        }

        .action-btn {
            background: #3a2a1a;
            border: none;
            padding: 8px 16px;
            font-family: monospace;
            font-weight: bold;
            color: #ffaa66;
            cursor: pointer;
            border-radius: 4px;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        /* Лог боя */
        .battle-log {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 280px;
            height: 180px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #ffaa33;
            border-radius: 8px;
            padding: 8px;
            overflow-y: auto;
            font-size: 11px;
            color: #aaffaa;
            z-index: 10;
            pointer-events: none;
            font-family: monospace;
        }

        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }

        /* Урон */
        .damage-popup {
            position: absolute;
            font-weight: bold;
            font-size: 18px;
            font-family: monospace;
            text-shadow: 1px 1px 0 black;
            pointer-events: none;
            z-index: 20;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #1e1a12;
            border: 2px solid #ffaa33;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            color: #ffdd99;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            color: #ffaa33;
        }

        .close-btn {
            background: #3a2a1a;
            padding: 10px;
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            border-radius: 8px;
        }

        .inventory-item, .skill-item {
            background: #2a2418;
            padding: 10px;
            margin: 6px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }

        /* Вход */
        .login-input {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #ffaa33;
            border-radius: 8px;
            color: #ffdd99;
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
        }

        .login-btn {
            background: #ffaa33;
            color: #1a1a1a;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
            font-weight: bold;
        }

        .save-status {
            font-size: 10px;
            color: #88ff88;
            background: #2a5a2a;
            padding: 2px 8px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div id="loginModal" class="modal" style="display: flex;">
    <div class="modal-content">
        <div class="modal-title">⚔️ RUCOY ONLINE ⚔️</div>
        <input type="text" id="playerNameInput" class="login-input" placeholder="Введите имя персонажа" maxlength="16">
        <div class="login-btn" onclick="login()">🎮 ВОЙТИ</div>
        <div class="login-btn" style="background:#3a2a1a;" onclick="guestLogin()">👤 ИГРАТЬ ГОСТЕМ</div>
        <div style="font-size: 11px; text-align: center; margin-top: 12px; color:#88aa88;">
            💾 Прогресс сохраняется автоматически
        </div>
    </div>
</div>

<div class="top-panel">
    <div class="stat">❤️ <span id="hpValue">100</span>/<span id="maxHpValue">100</span></div>
    <div class="stat">⚔️ <span id="dmgValue">25-35</span></div>
    <div class="stat">🛡️ <span id="defValue">15</span></div>
    <div class="stat">✨ Lv.<span id="levelValue">1</span></div>
    <div class="stat">💰 <span id="goldValue">500</span></div>
    <div class="stat">💎 <span id="diamondsValue">0</span></div>
    <div class="save-status" id="saveStatus">💾 Сохранено</div>
</div>

<div class="game-area">
    <canvas id="gameCanvas"></canvas>
    <div class="battle-log" id="battleLog">
        <div class="log-entry">✨ Добро пожаловать в Rucoy Online!</div>
        <div class="log-entry">⚔️ Кликай по врагам, чтобы атаковать</div>
        <div class="log-entry">🏃 Двигай мышкой/пальцем, чтобы ходить</div>
    </div>
</div>

<div class="bottom-panel">
    <div class="class-selector">
        <button class="class-btn active" id="classSword">⚔️ МЕЧНИК</button>
        <button class="class-btn" id="classBow">🏹 ЛУЧНИК</button>
        <button class="class-btn" id="classStaff">🔮 МАГ</button>
    </div>
    <div>
        <button class="action-btn" id="pvpBtn">⚔️ PVP</button>
        <button class="action-btn" id="inventoryBtn">📦 ИНВЕНТАРЬ</button>
        <button class="action-btn" id="skillsBtn">📊 НАВЫКИ</button>
        <button class="action-btn" id="healBtn">💊 ЛЕЧЕНИЕ</button>
        <button class="action-btn" id="saveBtn">💾 СОХРАНИТЬ</button>
    </div>
</div>

<div id="inventoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">📦 ИНВЕНТАРЬ</div>
        <div id="inventoryList"></div>
        <div class="close-btn" onclick="closeModal('inventoryModal')">ЗАКРЫТЬ</div>
    </div>
</div>

<div id="skillsModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">📊 НАВЫКИ</div>
        <div id="skillsList"></div>
        <div class="close-btn" onclick="closeModal('skillsModal')">ЗАКРЫТЬ</div>
    </div>
</div>

<script>
    // ========== КАНВАС ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let cw = 800, ch = 500;

    function resize() {
        const area = document.querySelector('.game-area');
        cw = area.clientWidth;
        ch = area.clientHeight;
        canvas.width = cw;
        canvas.height = ch;
        if (player) {
            player.x = Math.min(Math.max(player.x, 40), cw - 40);
            player.y = Math.min(Math.max(player.y, 40), ch - 40);
        }
        draw();
    }
    window.addEventListener('resize', resize);

    // ========== ИГРОК ==========
    let player = {
        id: null, name: "",
        level: 1, exp: 0,
        hp: 100, maxHp: 100,
        dmgMin: 25, dmgMax: 35,
        defense: 15,
        gold: 500, diamonds: 0,
        x: 400, y: 250,
        pvpMode: false, pvpKills: 0, pvpSkirmish: 0,
        skillSword: 1, skillBow: 1, skillStaff: 1, skillDefense: 1,
        class: "sword"
    };

    let monsters = [];
    let otherPlayers = [];
    let lastClick = 0;

    // Типы монстров
    const monsterTypes = [
        { name: "🐀 КРЫСА", emoji: "🐀", lvl: 1, hp: 50, dmgMin: 8, dmgMax: 15, exp: 15, gold: 20, def: 2, color: "#8a6a4a" },
        { name: "🐺 ВОЛК", emoji: "🐺", lvl: 3, hp: 120, dmgMin: 15, dmgMax: 25, exp: 35, gold: 45, def: 5, color: "#6a6a5a" },
        { name: "🧟 ЗОМБИ", emoji: "🧟", lvl: 5, hp: 200, dmgMin: 20, dmgMax: 35, exp: 60, gold: 80, def: 8, color: "#5a6a4a" },
        { name: "👹 ОРК", emoji: "👹", lvl: 8, hp: 350, dmgMin: 28, dmgMax: 48, exp: 100, gold: 120, def: 12, color: "#6a4a3a" },
        { name: "🐉 ДРАКОН", emoji: "🐉", lvl: 16, hp: 900, dmgMin: 55, dmgMax: 85, exp: 300, gold: 350, def: 25, color: "#8a4a2a" },
        { name: "💀 ЛИЧ", emoji: "💀", lvl: 20, hp: 1400, dmgMin: 75, dmgMax: 110, exp: 500, gold: 550, def: 32, color: "#6a4a6a" },
        { name: "👑 КОРОЛЬ", emoji: "👑", lvl: 25, hp: 2200, dmgMin: 100, dmgMax: 150, exp: 800, gold: 900, def: 45, color: "#aa8a4a" }
    ];

    // ========== РАСЧЕТЫ ==========
    function getPlayerDamage() {
        let bonus = 1;
        if (player.class === "sword") bonus = 1 + (player.skillSword - 1) * 0.05;
        if (player.class === "bow") bonus = 1 + (player.skillBow - 1) * 0.05;
        if (player.class === "staff") bonus = 1 + (player.skillStaff - 1) * 0.05;
        let min = Math.floor(player.dmgMin * bonus);
        let max = Math.floor(player.dmgMax * bonus);
        return Math.floor(Math.random() * (max - min + 1) + min);
    }

    function getPlayerDefense() {
        return Math.floor(player.defense * (1 + (player.skillDefense - 1) * 0.03));
    }

    function getRange() {
        if (player.class === "sword") return 55;
        if (player.class === "bow") return 130;
        return 120;
    }

    // ========== БОЙ ==========
    function attackMonster(monster, clickX, clickY) {
        let dx = player.x - monster.x;
        let dy = player.y - monster.y;
        if (Math.hypot(dx, dy) > getRange()) {
            addLog(`❌ Слишком далеко от ${monster.name}`);
            return;
        }

        let dmg = getPlayerDamage();
        let crit = Math.random() < 0.1;
        if (crit) dmg = Math.floor(dmg * 1.8);
        let finalDmg = Math.max(1, dmg - monster.def);
        monster.hp -= finalDmg;

        showDamage(clickX, clickY, finalDmg, crit);
        addLog(`⚔️ ${finalDmg} урона ${monster.name}${crit ? ' [КРИТ]' : ''}`);

        if (monster.hp <= 0) {
            addLog(`🎉 +${monster.exp} EXP, +${monster.gold}💰`);
            player.exp += monster.exp;
            player.gold += monster.gold;

            if (player.class === "sword") player.skillSword = Math.min(100, player.skillSword + 1);
            if (player.class === "bow") player.skillBow = Math.min(100, player.skillBow + 1);
            if (player.class === "staff") player.skillStaff = Math.min(100, player.skillStaff + 1);
            player.skillDefense = Math.min(100, player.skillDefense + 0.5);

            levelUp();
            monsters = monsters.filter(m => m !== monster);
            spawnMonster();
            updateUI();
            saveGame();
            draw();
            return;
        }

        let mDmg = Math.floor(Math.random() * (monster.dmgMax - monster.dmgMin + 1) + monster.dmgMin);
        let finalMDmg = Math.max(1, mDmg - getPlayerDefense());
        player.hp -= finalMDmg;
        showDamage(monster.x, monster.y - 20, finalMDmg, false, true);
        addLog(`😈 ${monster.name} наносит ${finalMDmg} урона`);

        if (player.hp <= 0) {
            player.hp = 0;
            addLog(`💀 ВЫ ПОГИБЛИ! -50💰`);
            player.gold = Math.max(0, player.gold - 50);
            player.hp = player.maxHp;
            player.x = cw / 2;
            player.y = ch / 2;
        }
        updateUI();
        saveGame();
        draw();
    }

    function attackPlayer(target, clickX, clickY) {
        if (!player.pvpMode && !target.pvpMode) {
            addLog(`❌ ${target.name} в мирном режиме`);
            return;
        }
        if (Math.hypot(player.x - target.x, player.y - target.y) > 60) {
            addLog(`❌ Слишком далеко для PvP`);
            return;
        }

        let dmg = getPlayerDamage();
        target.hp -= dmg;
        showDamage(clickX, clickY, dmg, false);
        addLog(`⚔️ PVP: ${dmg} урона ${target.name}`);

        if (target.hp <= 0) {
            addLog(`💀 ${target.name} повержен! +50💰`);
            player.gold += 50;
            player.pvpKills++;
            if (!target.pvpMode) {
                player.pvpSkirmish++;
                addLog(`⚠️ СКВЕРНА +1 (${player.pvpSkirmish})`);
                updatePvpUI();
            }
            otherPlayers = otherPlayers.filter(p => p !== target);
        }
        updateUI();
        saveGame();
        draw();
    }

    function heal() {
        if (player.gold < 50) {
            addLog(`❌ Нужно 50 золота`);
            return;
        }
        if (player.hp >= player.maxHp) {
            addLog(`❤️ Здоровье полное`);
            return;
        }
        player.gold -= 50;
        player.hp = player.maxHp;
        addLog(`💊 Здоровье восстановлено!`);
        updateUI();
        saveGame();
        draw();
    }

    function levelUp() {
        let need = player.level * 100;
        while (player.exp >= need) {
            player.exp -= need;
            player.level++;
            player.maxHp += 20;
            player.hp = player.maxHp;
            player.dmgMin += 5;
            player.dmgMax += 5;
            player.defense += 3;
            addLog(`✨✨✨ УРОВЕНЬ ${player.level}! ✨✨✨`);
            need = player.level * 100;
        }
        updateUI();
    }

    // ========== СПАВН ==========
    function spawnMonster() {
        if (monsters.length >= 10) return;
        let avail = monsterTypes.filter(m => m.lvl <= player.level + 5);
        if (!avail.length) avail = monsterTypes;
        let t = avail[Math.floor(Math.random() * avail.length)];
        monsters.push({
            ...t,
            id: Date.now() + Math.random(),
            hp: t.hp,
            x: Math.random() * (cw - 100) + 50,
            y: Math.random() * (ch - 100) + 50
        });
    }

    function spawnPlayers() {
        if (otherPlayers.length < 5 && Math.random() < 0.2) {
            otherPlayers.push({
                name: `Игрок${Math.floor(Math.random() * 999)}`,
                level: Math.floor(Math.random() * player.level) + 1,
                hp: 100, maxHp: 100,
                pvpMode: Math.random() < 0.3,
                x: Math.random() * (cw - 100) + 50,
                y: Math.random() * (ch - 100) + 50,
                color: "#6a8a4a"
            });
        }
        if (otherPlayers.length > 8) otherPlayers = otherPlayers.slice(0, 8);
    }

    // ========== ОТРИСОВКА ==========
    function draw() {
        if (!cw || !ch) return;
        ctx.clearRect(0, 0, cw, ch);
        
        // Трава
        ctx.fillStyle = "#3a6a2a";
        ctx.fillRect(0, 0, cw, ch);
        
        // Сетка
        ctx.strokeStyle = "#5a8a4a";
        ctx.lineWidth = 1;
        for (let i = 0; i < cw; i += 50) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, ch);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(cw, i);
            ctx.stroke();
        }
        
        // Другие игроки
        otherPlayers.forEach(p => {
            ctx.fillStyle = p.pvpMode ? "#aa5533" : "#6a8a4a";
            ctx.beginPath();
            ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 10px monospace";
            ctx.fillText(p.name, p.x - 20, p.y - 15);
            ctx.fillStyle = "#ffaa66";
            ctx.fillText(`Lv.${p.level}`, p.x - 12, p.y - 2);
            
            let hpP = p.hp / p.maxHp;
            ctx.fillStyle = "#331a0a";
            ctx.fillRect(p.x - 22, p.y - 28, 44, 5);
            ctx.fillStyle = "#c44";
            ctx.fillRect(p.x - 22, p.y - 28, 44 * hpP, 5);
            
            ctx.fillStyle = p.pvpMode ? "#ff8866" : "#88aa88";
            ctx.font = "8px monospace";
            ctx.fillText(p.pvpMode ? "🔴 PVP" : "⚪ МИР", p.x - 15, p.y + 28);
        });
        
        // Монстры
        monsters.forEach(m => {
            ctx.fillStyle = m.color;
            ctx.beginPath();
            ctx.arc(m.x, m.y, 28, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 18px monospace";
            ctx.fillText(m.emoji, m.x - 12, m.y - 5);
            ctx.font = "bold 9px monospace";
            ctx.fillStyle = "#ffaa66";
            ctx.fillText(m.name, m.x - 20, m.y - 22);
            
            let hpP = m.hp / (m.hpMax || m.hp);
            ctx.fillStyle = "#331a0a";
            ctx.fillRect(m.x - 28, m.y - 32, 56, 6);
            ctx.fillStyle = "#c44";
            ctx.fillRect(m.x - 28, m.y - 32, 56 * hpP, 6);
            
            ctx.fillStyle = "#aaaaff";
            ctx.font = "8px monospace";
            ctx.fillText(`Lv.${m.lvl}`, m.x - 12, m.y + 32);
        });
        
        // Игрок
        ctx.fillStyle = player.pvpMode ? "#cc5533" : "#4a8a4a";
        ctx.beginPath();
        ctx.arc(player.x, player.y, 24, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "bold 14px monospace";
        let emoji = player.class === "sword" ? "⚔️" : (player.class === "bow" ? "🏹" : "🔮");
        ctx.fillText(emoji, player.x - 9, player.y - 5);
        ctx.font = "bold 10px monospace";
        ctx.fillText(player.name, player.x - 20, player.y - 28);
        
        let hpP = player.hp / player.maxHp;
        ctx.fillStyle = "#331a0a";
        ctx.fillRect(player.x - 26, player.y - 38, 52, 7);
        ctx.fillStyle = "#44aa44";
        ctx.fillRect(player.x - 26, player.y - 38, 52 * hpP, 7);
        
        if (player.pvpSkirmish > 0) {
            ctx.fillStyle = "#ff6666";
            ctx.font = "bold 9px monospace";
            ctx.fillText(`СКВЕРНА ${player.pvpSkirmish}`, player.x - 30, player.y - 48);
        }
        
        // Радиус атаки
        let range = getRange();
        ctx.beginPath();
        ctx.arc(player.x, player.y, range, 0, Math.PI * 2);
        ctx.strokeStyle = "#ffdd88";
        ctx.setLineDash([8, 8]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // ========== УПРАВЛЕНИЕ ==========
    function handleClick(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let mx = (clientX - rect.left) * (cw / rect.width);
        let my = (clientY - rect.top) * (ch / rect.height);
        
        // Движение
        let dx = mx - player.x;
        let dy = my - player.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 5) {
            player.x += (dx / dist) * 6;
            player.y += (dy / dist) * 6;
        }
        player.x = Math.min(Math.max(player.x, 35), cw - 35);
        player.y = Math.min(Math.max(player.y, 35), ch - 35);
        
        // Атака по клику
        let now = Date.now();
        if (now - lastClick < 250) return;
        lastClick = now;
        
        for (let m of monsters) {
            if (Math.hypot(mx - m.x, my - m.y) < 35) {
                attackMonster(m, clientX, clientY);
                draw();
                return;
            }
        }
        for (let p of otherPlayers) {
            if (Math.hypot(mx - p.x, my - p.y) < 30) {
                attackPlayer(p, clientX, clientY);
                draw();
                return;
            }
        }
        draw();
    }

    function showDamage(x, y, dmg, crit, isMonster = false) {
        let div = document.createElement('div');
        div.className = 'damage-popup';
        div.textContent = `-${dmg}`;
        if (crit) div.style.color = '#ffaa44';
        if (isMonster) div.style.color = '#ff8866';
        div.style.left = (x - 20) + 'px';
        div.style.top = (y - 30) + 'px';
        document.querySelector('.game-area').appendChild(div);
        setTimeout(() => div.remove(), 700);
    }

    function addLog(msg) {
        let log = document.getElementById('battleLog');
        let entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = msg;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
        while (log.children.length > 60) log.removeChild(log.firstChild);
    }

    function updateUI() {
        document.getElementById('hpValue').innerHTML = player.hp;
        document.getElementById('maxHpValue').innerHTML = player.maxHp;
        document.getElementById('dmgValue').innerHTML = `${player.dmgMin}-${player.dmgMax}`;
        document.getElementById('defValue').innerHTML = getPlayerDefense();
        document.getElementById('levelValue').innerHTML = player.level;
        document.getElementById('goldValue').innerHTML = player.gold;
        document.getElementById('diamondsValue').innerHTML = player.diamonds;
    }

    function updatePvpUI() {
        let btn = document.getElementById('pvpBtn');
        btn.style.background = player.pvpMode ? "#aa5533" : "#3a2a1a";
        btn.innerHTML = player.pvpMode ? "🔴 PVP ВКЛ" : "⚔️ PVP";
    }

    function changeClass(c) {
        player.class = c;
        document.querySelectorAll('.class-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`class${c.charAt(0).toUpperCase() + c.slice(1)}`).classList.add('active');
        addLog(`⚔️ Класс сменен на ${c === "sword" ? "МЕЧНИК" : c === "bow" ? "ЛУЧНИК" : "МАГ"}`);
        draw();
        saveGame();
    }

    function togglePvP() {
        player.pvpMode = !player.pvpMode;
        updatePvpUI();
        addLog(player.pvpMode ? "🔴 PVP РЕЖИМ ВКЛЮЧЕН" : "⚪ PVP РЕЖИМ ВЫКЛЮЧЕН");
        draw();
        saveGame();
    }

    // ========== СОХРАНЕНИЕ ==========
    function saveGame() {
        if (!player.id && player.name === "Гость") return;
        let data = {
            player: {
                name: player.name, level: player.level, exp: player.exp,
                hp: player.hp, maxHp: player.maxHp,
                dmgMin: player.dmgMin, dmgMax: player.dmgMax,
                defense: player.defense, gold: player.gold, diamonds: player.diamonds,
                x: player.x, y: player.y,
                pvpMode: player.pvpMode, pvpKills: player.pvpKills, pvpSkirmish: player.pvpSkirmish,
                skillSword: player.skillSword, skillBow: player.skillBow,
                skillStaff: player.skillStaff, skillDefense: player.skillDefense,
                class: player.class
            },
            monsters: monsters.map(m => ({
                name: m.name, emoji: m.emoji, lvl: m.lvl, hp: m.hp, hpMax: m.hpMax || m.hp,
                dmgMin: m.dmgMin, dmgMax: m.dmgMax, exp: m.exp, gold: m.gold, def: m.def,
                color: m.color, x: m.x, y: m.y
            }))
        };
        localStorage.setItem(`rucoy_${player.id || player.name}`, JSON.stringify(data));
        let status = document.getElementById('saveStatus');
        status.innerHTML = "💾 Сохранено!";
        status.style.color = "#aaffaa";
        setTimeout(() => { status.innerHTML = "💾 Сохранено"; }, 2000);
    }

    function loadGame(identifier) {
        let saved = localStorage.getItem(`rucoy_${identifier}`);
        if (!saved) return false;
        try {
            let data = JSON.parse(saved);
            Object.assign(player, data.player);
            monsters = data.monsters.map(m => ({ ...m, hp: m.hp, hpMax: m.hpMax || m.hp }));
            if (!player.x) player.x = cw / 2;
            if (!player.y) player.y = ch / 2;
            updateUI();
            updatePvpUI();
            draw();
            addLog(`💾 Загружен прогресс: ${player.name}, уровень ${player.level}`);
            return true;
        } catch(e) { return false; }
    }

    // ========== ВХОД ==========
    function login() {
        let name = document.getElementById('playerNameInput').value.trim();
        if (!name) { alert("Введите имя!"); return; }
        player.name = name;
        player.id = name.toLowerCase().replace(/[^a-z0-9]/g, '_');
        if (!loadGame(player.id)) {
            addLog(`✨ Добро пожаловать, ${player.name}!`);
            for (let i = 0; i < 4; i++) spawnMonster();
        }
        document.getElementById('loginModal').style.display = 'none';
        startGame();
    }

    function guestLogin() {
        player.name = "Гость_" + Math.floor(Math.random() * 9999);
        player.id = "guest_" + Date.now();
        addLog(`👤 Игра как гость: ${player.name}`);
        for (let i = 0; i < 4; i++) spawnMonster();
        document.getElementById('loginModal').style.display = 'none';
        startGame();
    }

    function showInventory() {
        let list = document.getElementById('inventoryList');
        list.innerHTML = `
            <div class="inventory-item">⚔️ Мечник: ${player.skillSword} ур. (+${Math.floor((player.skillSword-1)*5)}%)</div>
            <div class="inventory-item">🏹 Лучник: ${player.skillBow} ур. (+${Math.floor((player.skillBow-1)*5)}%)</div>
            <div class="inventory-item">🔮 Маг: ${player.skillStaff} ур. (+${Math.floor((player.skillStaff-1)*5)}%)</div>
            <div class="inventory-item">🛡️ Защита: ${player.skillDefense} ур. (+${Math.floor((player.skillDefense-1)*3)}%)</div>
            <div class="inventory-item">💰 Золото: ${player.gold}</div>
            <div class="inventory-item">💎 Алмазы: ${player.diamonds}</div>
            <div class="inventory-item">⚔️ PVP убийств: ${player.pvpKills}</div>
            <div class="inventory-item">⚠️ Скверна: ${player.pvpSkirmish}</div>
        `;
        document.getElementById('inventoryModal').style.display = 'flex';
    }

    function showSkills() {
        let list = document.getElementById('skillsList');
        list.innerHTML = `
            <div class="skill-item">⚔️ МЕЧНИК: ${player.skillSword} ур. (${Math.floor((player.skillSword-1)*5)}% урона)</div>
            <div class="skill-item">🏹 ЛУЧНИК: ${player.skillBow} ур. (${Math.floor((player.skillBow-1)*5)}% урона)</div>
            <div class="skill-item">🔮 МАГ: ${player.skillStaff} ур. (${Math.floor((player.skillStaff-1)*5)}% урона)</div>
            <div class="skill-item">🛡️ ЗАЩИТА: ${player.skillDefense} ур. (${Math.floor((player.skillDefense-1)*3)}% защиты)</div>
        `;
        document.getElementById('skillsModal').style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function startGame() {
        resize();
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); });
        
        document.getElementById('classSword').onclick = () => changeClass('sword');
        document.getElementById('classBow').onclick = () => changeClass('bow');
        document.getElementById('classStaff').onclick = () => changeClass('staff');
        document.getElementById('pvpBtn').onclick = togglePvP;
        document.getElementById('inventoryBtn').onclick = showInventory;
        document.getElementById('skillsBtn').onclick = showSkills;
        document.getElementById('healBtn').onclick = heal;
        document.getElementById('saveBtn').onclick = saveGame;
        
        setInterval(() => { spawnPlayers(); draw(); }, 8000);
        setInterval(() => { if (monsters.length < 6) spawnMonster(); draw(); }, 5000);
        setInterval(() => saveGame(), 30000);
        window.addEventListener('beforeunload', () => saveGame());
        
        draw();
        addLog(`📊 Уровень ${player.level}, опыт ${player.exp}/${player.level*100}`);
    }

    resize();
</script>
</body>
</html>
