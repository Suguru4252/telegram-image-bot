<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online — Пиксельная MMORPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b0e14;
            font-family: 'Courier New', 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .game-wrapper {
            max-width: 1100px;
            width: 100%;
            background: #1a1c1a;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 3px solid #d4b87a;
        }

        .top-panel {
            background: #1e1a12;
            padding: 8px 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #d4b87a;
        }

        .stat {
            background: #2a2418;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #ffdd99;
            box-shadow: inset 0 0 0 1px #5a4a2e;
        }

        .stat span {
            color: #ffaa55;
        }

        .save-status {
            background: #2a5a2a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #ccffaa;
        }

        .game-area {
            position: relative;
            background: #2a382a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            cursor: crosshair;
            box-shadow: 0 0 0 4px #2a2418, 0 0 0 8px #5a4a2e;
            background: #2a382a;
        }

        .bottom-panel {
            background: #1e1a12;
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-top: 2px solid #d4b87a;
        }

        .class-buttons {
            display: flex;
            gap: 8px;
        }

        .pixel-btn {
            background: #2a2418;
            border: none;
            padding: 8px 16px;
            font-family: monospace;
            font-weight: bold;
            font-size: 13px;
            color: #e6d5a8;
            cursor: pointer;
            border-bottom: 3px solid #7a5a3a;
            transition: 0.05s linear;
        }

        .pixel-btn.active {
            background: #4a3a22;
            border-bottom-color: #ffcc66;
            color: #ffdd99;
            text-shadow: 0 0 2px #ffaa33;
        }

        .pixel-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Всплывающее уведомление */
        .toast-notification {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #d4b87a;
            border-radius: 12px;
            padding: 10px 16px;
            color: #ffdd99;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            z-index: 100;
            animation: slideIn 0.3s ease-out;
            pointer-events: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .damage-pop {
            position: absolute;
            font-weight: bold;
            font-size: 18px;
            font-family: monospace;
            text-shadow: 1px 1px 0 black;
            pointer-events: none;
            z-index: 25;
            animation: floatUp 0.7s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-45px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal-card {
            background: #2a2418;
            border: 4px solid #d4b87a;
            padding: 20px;
            max-width: 350px;
            width: 90%;
            border-radius: 20px;
            color: #ffdd99;
        }

        .modal-title {
            font-size: 22px;
            text-align: center;
            margin-bottom: 16px;
            color: #ffcc66;
        }

        .close-btn {
            background: #3a2a1a;
            padding: 10px;
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            border-radius: 30px;
        }

        .inv-item, .skill-item {
            background: #1e1a12;
            margin: 8px 0;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid #ffaa66;
        }

        input {
            background: #0a0a0a;
            border: 2px solid #d4b87a;
            padding: 12px;
            width: 100%;
            color: #ffdd99;
            font-family: monospace;
            font-size: 16px;
            margin: 8px 0;
            text-align: center;
        }
    </style>
</head>
<body>
<div id="loginModal" class="modal" style="display: flex;">
    <div class="modal-card">
        <div class="modal-title">⚔️ RUCOY ONLINE ⚔️</div>
        <input type="text" id="playerName" placeholder="Имя героя" maxlength="16" value="Sugiru">
        <button class="pixel-btn" style="width:100%; margin-top:8px;" onclick="login()">🎮 ВОЙТИ</button>
        <button class="pixel-btn" style="width:100%; margin-top:8px; background:#3a2a1a;" onclick="guestLogin()">👤 ГОСТЬ</button>
        <div style="font-size: 10px; text-align: center; margin-top: 12px;">💾 Автосохранение</div>
    </div>
</div>

<div class="game-wrapper" style="display: none;" id="gameWrapper">
    <div class="top-panel">
        <div class="stat">❤️ <span id="hpVal">100</span>/<span id="maxHpVal">100</span></div>
        <div class="stat">⚔️ <span id="dmgVal">25-35</span></div>
        <div class="stat">🛡️ <span id="defVal">15</span></div>
        <div class="stat">✨ Lv.<span id="lvlVal">1</span></div>
        <div class="stat">💰 <span id="goldVal">500</span></div>
        <div class="stat">💎 <span id="diaVal">0</span></div>
        <div class="save-status" id="saveStatus">💾 Сохранено</div>
    </div>

    <div class="game-area" id="gameArea">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="bottom-panel">
        <div class="class-buttons">
            <button class="pixel-btn active" id="btnSword">⚔️ МЕЧНИК</button>
            <button class="pixel-btn" id="btnBow">🏹 ЛУЧНИК</button>
            <button class="pixel-btn" id="btnStaff">🔮 МАГ</button>
        </div>
        <div>
            <button class="pixel-btn" id="pvpBtn">⚔️ PVP</button>
            <button class="pixel-btn" id="invBtn">📦 ИНВЕНТАРЬ</button>
            <button class="pixel-btn" id="skillBtn">📊 НАВЫКИ</button>
            <button class="pixel-btn" id="healBtn">💊 ЛЕЧЕНИЕ</button>
            <button class="pixel-btn" id="saveBtn">💾 СОХРАНИТЬ</button>
        </div>
    </div>
</div>

<div id="invModal" class="modal"><div class="modal-card"><div class="modal-title">📦 ИНВЕНТАРЬ</div><div id="invList"></div><div class="close-btn" onclick="closeModal('invModal')">ЗАКРЫТЬ</div></div></div>
<div id="skillModal" class="modal"><div class="modal-card"><div class="modal-title">📊 НАВЫКИ</div><div id="skillList"></div><div class="close-btn" onclick="closeModal('skillModal')">ЗАКРЫТЬ</div></div></div>

<script>
    // ---------- ПИКСЕЛЬНАЯ КАРТА ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let TILE = 48;
    let MAP_W = 20;
    let MAP_H = 15;
    let mapTiles = [];

    function generateMap() {
        for (let y = 0; y < MAP_H; y++) {
            mapTiles[y] = [];
            for (let x = 0; x < MAP_W; x++) {
                if (x === 0 || y === 0 || x === MAP_W-1 || y === MAP_H-1) mapTiles[y][x] = 3;
                else if (Math.random() < 0.05) mapTiles[y][x] = 2;
                else if (Math.random() < 0.03) mapTiles[y][x] = 1;
                else mapTiles[y][x] = 0;
            }
        }
    }

    const tileColors = {
        0: { main: "#3f7840", dark: "#2a572a", light: "#5f9e4a" },
        1: { main: "#6e6e6e", dark: "#4a4a4a", light: "#8e8e8e" },
        2: { main: "#5e4a2a", dark: "#3a2a1a", light: "#7e6a4a" },
        3: { main: "#5a5a5a", dark: "#3a3a3a", light: "#7a7a7a" }
    };

    function drawTile(x, y, type) {
        const px = x * TILE, py = y * TILE;
        const col = tileColors[type];
        ctx.fillStyle = col.main;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = col.dark;
        for (let i = 0; i < 3; i++) ctx.fillRect(px + 8 + i*12, py + 12, 4, 4);
        ctx.fillStyle = col.light;
        for (let i = 0; i < 3; i++) ctx.fillRect(px + 16 + i*10, py + 28, 3, 3);
        ctx.strokeStyle = "#2e2e1e";
        ctx.lineWidth = 1;
        ctx.strokeRect(px, py, TILE, TILE);
    }

    // ---------- ПИКСЕЛЬНЫЙ ГЕРОЙ ----------
    function drawHero(x, y, moving, className) {
        const px = x * TILE, py = y * TILE;
        const offX = (TILE - 32) / 2, offY = (TILE - 32) / 2 + 4;
        const armor = className === "sword" ? "#6e8e5a" : (className === "bow" ? "#b87a4a" : "#5a7a9e");
        const skin = "#f5d4a4";
        ctx.fillStyle = armor;
        ctx.fillRect(px+offX+8, py+offY+16, 16, 12);
        ctx.fillStyle = skin;
        ctx.fillRect(px+offX+12, py+offY+8, 8, 12);
        ctx.fillStyle = "#000";
        ctx.fillRect(px+offX+13, py+offY+12, 2, 2);
        ctx.fillRect(px+offX+17, py+offY+12, 2, 2);
        ctx.fillStyle = "#3a2a1a";
        ctx.fillRect(px+offX+11, py+offY+4, 10, 6);
        ctx.fillStyle = "#c9b06a";
        if (className === "sword") {
            ctx.fillRect(px+offX+24, py+offY+20, 6, 3);
            ctx.fillRect(px+offX+28, py+offY+18, 2, 8);
        } else if (className === "bow") {
            ctx.fillRect(px+offX+22, py+offY+22, 10, 2);
            ctx.fillRect(px+offX+26, py+offY+18, 2, 8);
        } else {
            ctx.fillRect(px+offX+22, py+offY+20, 8, 4);
            for(let i=0;i<3;i++) ctx.fillRect(px+offX+24+i*2, py+offY+14, 1, 6);
        }
        ctx.fillStyle = "#6a5a3a";
        ctx.fillRect(px+offX+10, py+offY+28, 6, 6);
        ctx.fillRect(px+offX+16, py+offY+28, 6, 6);
        if (moving) {
            ctx.fillStyle = "#ba9a6a";
            ctx.fillRect(px+offX+10, py+offY+32, 6, 3);
            ctx.fillRect(px+offX+16, py+offY+32, 6, 3);
        }
    }

    function drawMonster(x, y, monster) {
        const px = x * TILE, py = y * TILE;
        const off = (TILE-32)/2;
        ctx.fillStyle = monster.color;
        ctx.fillRect(px+off+6, py+off+12, 20, 18);
        ctx.fillRect(px+off+10, py+off+6, 12, 10);
        ctx.fillStyle = "#000";
        ctx.fillRect(px+off+12, py+off+14, 3, 3);
        ctx.fillRect(px+off+17, py+off+14, 3, 3);
        ctx.fillStyle = "#bb8866";
        ctx.fillRect(px+off+14, py+off+22, 4, 4);
        let percent = monster.hp / monster.maxHp;
        ctx.fillStyle = "#331a0a";
        ctx.fillRect(px+off+4, py+off-6, 24, 5);
        ctx.fillStyle = "#c44";
        ctx.fillRect(px+off+4, py+off-6, 24 * percent, 5);
        ctx.fillStyle = "#ffcc88";
        ctx.font = "bold 8px monospace";
        ctx.fillText(monster.name, px+off+2, py+off-8);
    }

    // ---------- ВСПЛЫВАЮЩИЕ УВЕДОМЛЕНИЯ ----------
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.textContent = message;
        if (isError) {
            toast.style.borderColor = '#ff8866';
            toast.style.color = '#ffaa88';
        }
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ---------- ИГРОВЫЕ ДАННЫЕ ----------
    let player = {
        id: null, name: "Sugiru", level: 1, exp: 0, hp: 100, maxHp: 100,
        dmgMin: 25, dmgMax: 35, defense: 15,
        gold: 500, diamonds: 0,
        x: 10, y: 7, targetX: 10, targetY: 7, moving: false,
        pvpMode: false, pvpKills: 0, pvpSkirmish: 0,
        skillSword: 1, skillBow: 1, skillStaff: 1, skillDefense: 1,
        class: "sword"
    };

    let monsters = [];
    let otherPlayers = [];

    const monsterTypes = [
        { name: "КРЫСА", lvl:1, hp:55, dmgMin:8, dmgMax:15, exp:15, gold:20, def:2, color:"#8e6a4a" },
        { name: "ВОЛК", lvl:3, hp:120, dmgMin:15, dmgMax:25, exp:35, gold:45, def:5, color:"#6a6a5a" },
        { name: "ЗОМБИ", lvl:5, hp:200, dmgMin:20, dmgMax:35, exp:60, gold:80, def:8, color:"#6a7a4a" },
        { name: "ОРК", lvl:8, hp:350, dmgMin:28, dmgMax:48, exp:100, gold:120, def:12, color:"#7a5a3a" },
        { name: "ДРАКОН", lvl:16, hp:900, dmgMin:55, dmgMax:85, exp:300, gold:350, def:25, color:"#9a5a3a" }
    ];

    function canWalk(tx, ty) {
        if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return false;
        const t = mapTiles[ty][tx];
        return t !== 2 && t !== 3;
    }

    function getDamageBonus() {
        let mult = 1;
        if (player.class === "sword") mult = 1 + (player.skillSword-1)*0.05;
        if (player.class === "bow") mult = 1 + (player.skillBow-1)*0.05;
        if (player.class === "staff") mult = 1 + (player.skillStaff-1)*0.05;
        let min = Math.floor(player.dmgMin * mult);
        let max = Math.floor(player.dmgMax * mult);
        return Math.floor(Math.random()*(max-min+1)+min);
    }

    function getDefense() {
        return Math.floor(player.defense * (1 + (player.skillDefense-1)*0.03));
    }

    function attackRange() {
        if (player.class === "sword") return 1.2;
        if (player.class === "bow") return 3.6;
        return 3.2;
    }

    function moveToTarget() {
        if (!player.moving) return;
        let dx = player.targetX - player.x, dy = player.targetY - player.y;
        if (dx === 0 && dy === 0) { 
            player.moving = false; 
            return; 
        }
        let nx = player.x, ny = player.y;
        if (Math.abs(dx) > 0) nx += dx > 0 ? 1 : -1;
        else if (Math.abs(dy) > 0) ny += dy > 0 ? 1 : -1;
        if (canWalk(nx, ny)) {
            player.x = nx;
            player.y = ny;
        } else {
            player.moving = false;
        }
    }

    function attackMonster(mon) {
        let dist = Math.abs(player.x - mon.x) + Math.abs(player.y - mon.y);
        if (dist > attackRange()) { 
            showToast(`❌ Слишком далеко от ${mon.name}`, true);
            return false; 
        }
        let dmg = getDamageBonus();
        let crit = Math.random() < 0.1;
        if (crit) dmg = Math.floor(dmg * 1.8);
        let final = Math.max(1, dmg - mon.def);
        mon.hp -= final;
        showDamage(mon.x*TILE+TILE/2, mon.y*TILE+20, final, crit);
        
        if (mon.hp <= 0) {
            showToast(`🎉 +${mon.exp} EXP, +${mon.gold}💰`);
            player.exp += mon.exp;
            player.gold += mon.gold;
            if (player.class === "sword") player.skillSword = Math.min(100, player.skillSword+1);
            if (player.class === "bow") player.skillBow = Math.min(100, player.skillBow+1);
            if (player.class === "staff") player.skillStaff = Math.min(100, player.skillStaff+1);
            player.skillDefense = Math.min(100, player.skillDefense+0.5);
            levelUp();
            monsters = monsters.filter(m => m !== mon);
            spawnMonster();
            updateUI();
            saveGame();
            return true;
        }
        
        let mDmg = Math.floor(Math.random()*(mon.dmgMax-mon.dmgMin+1)+mon.dmgMin);
        let finalMDmg = Math.max(1, mDmg - getDefense());
        player.hp -= finalMDmg;
        showDamage(player.x*TILE+TILE/2, player.y*TILE+20, finalMDmg, false, true);
        showToast(`😈 ${mon.name} наносит ${finalMDmg} урона`, true);
        
        if (player.hp <= 0) {
            player.hp = 0;
            showToast(`💀 ВЫ ПАЛИ! -50💰`, true);
            player.gold = Math.max(0, player.gold-50);
            player.hp = player.maxHp;
            player.x = 10; player.y = 7; 
            player.targetX = 10; player.targetY = 7;
        }
        updateUI(); 
        saveGame();
        return true;
    }

    function heal() {
        if (player.gold < 50) { 
            showToast(`❌ Нужно 50 золота`, true);
            return; 
        }
        if (player.hp >= player.maxHp) { 
            showToast(`❤️ Здоровье полное`);
            return; 
        }
        player.gold -= 50;
        player.hp = player.maxHp;
        showToast(`💊 Здоровье восстановлено!`);
        updateUI(); 
        saveGame();
    }

    function levelUp() {
        let need = player.level * 100;
        while (player.exp >= need) {
            player.exp -= need;
            player.level++;
            player.maxHp += 20;
            player.hp = player.maxHp;
            player.dmgMin += 5;
            player.dmgMax += 5;
            player.defense += 3;
            showToast(`✨✨✨ УРОВЕНЬ ${player.level}! ✨✨✨`);
            need = player.level * 100;
        }
        updateUI();
    }

    function spawnMonster() {
        if (monsters.length >= 10) return;
        let possible = monsterTypes.filter(m => m.lvl <= player.level+5);
        if (possible.length === 0) possible = monsterTypes;
        let t = possible[Math.floor(Math.random()*possible.length)];
        let x, y;
        do { 
            x = 1 + Math.floor(Math.random()*(MAP_W-2)); 
            y = 1 + Math.floor(Math.random()*(MAP_H-2)); 
        } while (!canWalk(x,y) || (Math.abs(x-player.x)+Math.abs(y-player.y) < 2));
        monsters.push({ ...t, id: Date.now()+Math.random(), hp: t.hp, maxHp: t.hp, x, y });
    }

    // ---------- ОБРАБОТКА КЛИКОВ ----------
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        let cx, cy;
        if (e.touches) { 
            cx = e.touches[0].clientX; 
            cy = e.touches[0].clientY; 
        } else { 
            cx = e.clientX; 
            cy = e.clientY; 
        }
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        let mx = (cx - rect.left) * scaleX;
        let my = (cy - rect.top) * scaleY;
        let tx = Math.floor(mx / TILE);
        let ty = Math.floor(my / TILE);
        
        if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return;
        
        let monsterHere = monsters.find(m => m.x === tx && m.y === ty);
        if (monsterHere) { 
            attackMonster(monsterHere); 
            drawGame(); 
            return; 
        }
        
        if (canWalk(tx, ty)) {
            player.targetX = tx;
            player.targetY = ty;
            player.moving = true;
        }
        drawGame();
    }

    function showDamage(x, y, dmg, crit, isMonster=false) {
        let div = document.createElement('div');
        div.className = 'damage-pop';
        div.textContent = `-${dmg}`;
        if (crit) div.style.color = '#ffaa44';
        if (isMonster) div.style.color = '#ff8866';
        div.style.left = (x-15)+'px';
        div.style.top = (y-20)+'px';
        document.getElementById('gameArea').appendChild(div);
        setTimeout(()=>div.remove(),700);
    }

    // ---------- ОТРИСОВКА ----------
    function drawGame() {
        canvas.width = MAP_W * TILE;
        canvas.height = MAP_H * TILE;
        for (let y = 0; y < MAP_H; y++)
            for (let x = 0; x < MAP_W; x++)
                drawTile(x, y, mapTiles[y][x]);
        monsters.forEach(m => drawMonster(m.x, m.y, m));
        otherPlayers.forEach(p => drawHero(p.x, p.y, false, p.class || "sword"));
        drawHero(player.x, player.y, player.moving, player.class);
        
        let hpPercent = player.hp / player.maxHp;
        ctx.fillStyle = "#331a0a";
        ctx.fillRect(player.x*TILE+8, player.y*TILE-12, 32, 5);
        ctx.fillStyle = "#44aa44";
        ctx.fillRect(player.x*TILE+8, player.y*TILE-12, 32*hpPercent, 5);
        ctx.fillStyle = "#ffdd99";
        ctx.font = "bold 10px monospace";
        ctx.fillText(player.name, player.x*TILE+10, player.y*TILE-16);
        if (player.pvpSkirmish > 0) {
            ctx.fillStyle = "#ff8866";
            ctx.font = "bold 7px monospace";
            ctx.fillText(`СКВЕРНА ${player.pvpSkirmish}`, player.x*TILE+6, player.y*TILE-24);
        }
    }

    function updateUI() {
        document.getElementById('hpVal').innerText = player.hp;
        document.getElementById('maxHpVal').innerText = player.maxHp;
        document.getElementById('dmgVal').innerText = `${player.dmgMin}-${player.dmgMax}`;
        document.getElementById('defVal').innerText = getDefense();
        document.getElementById('lvlVal').innerText = player.level;
        document.getElementById('goldVal').innerText = player.gold;
        document.getElementById('diaVal').innerText = player.diamonds;
    }

    // ---------- СОХРАНЕНИЕ ----------
    function saveGame() {
        if (!player.id && player.name === "Гость") return;
        let data = {
            player: {
                name: player.name, level: player.level, exp: player.exp,
                hp: player.hp, maxHp: player.maxHp, dmgMin: player.dmgMin, dmgMax: player.dmgMax,
                defense: player.defense, gold: player.gold, diamonds: player.diamonds,
                x: player.x, y: player.y, pvpMode: player.pvpMode, pvpKills: player.pvpKills,
                pvpSkirmish: player.pvpSkirmish, skillSword: player.skillSword, skillBow: player.skillBow,
                skillStaff: player.skillStaff, skillDefense: player.skillDefense, class: player.class
            },
            monsters: monsters.map(m => ({ name: m.name, lvl: m.lvl, hp: m.hp, maxHp: m.maxHp,
                dmgMin: m.dmgMin, dmgMax: m.dmgMax, exp: m.exp, gold: m.gold, def: m.def,
                color: m.color, x: m.x, y: m.y }))
        };
        localStorage.setItem(`rucoy_${player.id || player.name}`, JSON.stringify(data));
        let st = document.getElementById('saveStatus');
        st.innerText = "💾 Сохранено!";
        setTimeout(()=> st.innerText = "💾 Сохранено", 2000);
    }

    function loadGame(identifier) {
        let raw = localStorage.getItem(`rucoy_${identifier}`);
        if (!raw) return false;
        try {
            let data = JSON.parse(raw);
            Object.assign(player, data.player);
            monsters = data.monsters.map(m => ({ ...m, hp: m.hp, maxHp: m.maxHp }));
            updateUI();
            showToast(`💾 Загружен прогресс: ${player.name}, уровень ${player.level}`);
            return true;
        } catch(e) { return false; }
    }

    // ---------- КЛАССЫ И PVP ----------
    function changeClass(c) {
        player.class = c;
        document.querySelectorAll('.class-buttons .pixel-btn').forEach(btn=>btn.classList.remove('active'));
        if(c === 'sword') document.getElementById('btnSword').classList.add('active');
        if(c === 'bow') document.getElementById('btnBow').classList.add('active');
        if(c === 'staff') document.getElementById('btnStaff').classList.add('active');
        showToast(`⚔️ Класс сменён на ${c === 'sword' ? 'МЕЧНИК' : c === 'bow' ? 'ЛУЧНИК' : 'МАГ'}`);
        saveGame();
        drawGame();
    }

    function togglePvP() {
        player.pvpMode = !player.pvpMode;
        let btn = document.getElementById('pvpBtn');
        btn.style.background = player.pvpMode ? "#aa5533" : "#2a2418";
        btn.innerText = player.pvpMode ? "🔴 PVP ВКЛ" : "⚔️ PVP";
        showToast(player.pvpMode ? "🔴 PVP РЕЖИМ ВКЛЮЧЕН" : "⚪ PVP РЕЖИМ ВЫКЛЮЧЕН");
        saveGame();
    }

    function showInventory() {
        let div = document.getElementById('invList');
        div.innerHTML = `
            <div class="inv-item">⚔️ Мечник: ${player.skillSword} ур. (+${Math.floor((player.skillSword-1)*5)}%)</div>
            <div class="inv-item">🏹 Лучник: ${player.skillBow} ур. (+${Math.floor((player.skillBow-1)*5)}%)</div>
            <div class="inv-item">🔮 Маг: ${player.skillStaff} ур. (+${Math.floor((player.skillStaff-1)*5)}%)</div>
            <div class="inv-item">🛡️ Защита: ${player.skillDefense} ур. (+${Math.floor((player.skillDefense-1)*3)}%)</div>
            <div class="inv-item">💰 Золото: ${player.gold}</div>
            <div class="inv-item">💎 Алмазы: ${player.diamonds}</div>
            <div class="inv-item">⚔️ PVP убийств: ${player.pvpKills}</div>
            <div class="inv-item">⚠️ Скверна: ${player.pvpSkirmish}</div>`;
        document.getElementById('invModal').style.display = 'flex';
    }

    function showSkills() {
        let div = document.getElementById('skillList');
        div.innerHTML = `
            <div class="skill-item">⚔️ МЕЧНИК: ${player.skillSword} ур. (+${Math.floor((player.skillSword-1)*5)}% урона)</div>
            <div class="skill-item">🏹 ЛУЧНИК: ${player.skillBow} ур. (+${Math.floor((player.skillBow-1)*5)}% урона)</div>
            <div class="skill-item">🔮 МАГ: ${player.skillStaff} ур. (+${Math.floor((player.skillStaff-1)*5)}% урона)</div>
            <div class="skill-item">🛡️ ЗАЩИТА: ${player.skillDefense} ур. (+${Math.floor((player.skillDefense-1)*3)}% защиты)</div>`;
        document.getElementById('skillModal').style.display = 'flex';
    }

    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
    }

    // ---------- АНИМАЦИЯ ----------
    function gameLoop() {
        moveToTarget();
        drawGame();
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        generateMap();
        for(let i = 0; i < 5; i++) spawnMonster();
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleCanvasClick(e); });
        document.getElementById('btnSword').onclick = ()=>changeClass('sword');
        document.getElementById('btnBow').onclick = ()=>changeClass('bow');
        document.getElementById('btnStaff').onclick = ()=>changeClass('staff');
        document.getElementById('pvpBtn').onclick = togglePvP;
        document.getElementById('invBtn').onclick = showInventory;
        document.getElementById('skillBtn').onclick = showSkills;
        document.getElementById('healBtn').onclick = heal;
        document.getElementById('saveBtn').onclick = saveGame;
        setInterval(()=> { if(monsters.length < 6) spawnMonster(); drawGame(); }, 9000);
        setInterval(()=> saveGame(), 30000);
        window.addEventListener('beforeunload', ()=>saveGame());
        gameLoop();
        updateUI();
        showToast(`📊 Уровень ${player.level}, опыт ${player.exp}/${player.level*100}`);
    }

    function login() {
        let name = document.getElementById('playerName').value.trim();
        if (!name) { alert("Введите имя!"); return; }
        player.name = name;
        player.id = name.toLowerCase().replace(/[^a-z0-9]/g,'_');
        if (!loadGame(player.id)) {
            showToast(`✨ Добро пожаловать, ${player.name}!`);
            for(let i = 0; i < 4; i++) spawnMonster();
        }
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';
        startGame();
    }

    function guestLogin() {
        player.name = "Гость_" + Math.floor(Math.random()*9999);
        player.id = "guest_"+Date.now();
        showToast(`👤 Игра как гость: ${player.name}`);
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';
        startGame();
    }

    window.addEventListener('resize', ()=>{ if(canvas) drawGame(); });
</script>
</body>
</html>
