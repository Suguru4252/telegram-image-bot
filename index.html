<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rucoy Online Style - Прототип MMORPG</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'VT323', monospace;
            margin: 0;
            padding: 20px;
        }

        /* Игровой контейнер */
        .game-container {
            background: #1a1f2e;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid #4a4f6e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            cursor: crosshair;
            box-shadow: 0 0 0 2px #2a2f3e, 0 0 0 4px #0f121c;
        }

        /* Панель статистики (стилизация как в Rucoy) */
        .stats-panel {
            background: #0b0e16e0;
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 8px 16px;
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
            border: 1px solid #4a5070;
        }

        .stat {
            background: #000000aa;
            padding: 4px 12px;
            border-radius: 20px;
            color: #ffd966;
            font-size: 1.1rem;
        }

        .hp-bar-bg {
            background: #3a1f1f;
            border-radius: 12px;
            width: 160px;
            height: 18px;
            overflow: hidden;
        }
        .hp-fill {
            background: #d44a4a;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            transition: width 0.1s linear;
        }
        .mp-fill {
            background: #4a7db4;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            transition: width 0.1s linear;
        }

        button {
            background: #2c2f3f;
            border: none;
            font-family: monospace;
            font-weight: bold;
            color: #eee;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 2px 0 #0a0a12;
            transition: 0.07s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .class-btn {
            background: #2a2e4a;
        }
        .active-class {
            background: #6a3e9e;
            box-shadow: 0 0 6px #a97eff;
            border: 1px solid #c9aaff;
        }
        .log-area {
            background: #010101aa;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccc;
        }
        @media (max-width: 700px) {
            .stats-panel { flex-direction: column; align-items: stretch; }
            .log-area { max-width: none; text-align: center; white-space: normal; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div class="stats-panel">
            <div class="stat">⚔️ Lv.<span id="levelVal">1</span></div>
            <div class="stat">🛡️ <span id="classLabel">Рыцарь</span></div>
            <div style="display: flex; gap: 6px;">
                <div class="hp-bar-bg"><div class="hp-fill" id="hpFill" style="width: 100%"></div></div>
                <div class="hp-bar-bg" style="background:#1f2a3a;"><div class="mp-fill" id="mpFill" style="width: 100%"></div></div>
            </div>
            <div class="stat">❤️ <span id="hpText">100/100</span></div>
            <div class="stat">💧 <span id="mpText">50/50</span></div>
            <div class="stat">✨ XP: <span id="xpVal">0</span>/<span id="nextXp">100</span></div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 10px; gap: 8px; flex-wrap: wrap;">
            <div style="display: flex; gap: 8px;">
                <button id="classKnight" class="class-btn active-class">🛡️ Рыцарь</button>
                <button id="classArcher" class="class-btn">🏹 Лучник</button>
                <button id="classMage" class="class-btn">🔮 Маг</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="healBtn">💊 Лечение (HP)</button>
                <button id="manaBtn">✨ Мана</button>
                <button id="spellBtn" style="background:#5a3e2a;">✨✨ Спец.удар</button>
            </div>
            <div class="log-area" id="logMsg">👋 Нажми на монстра для атаки!</div>
        </div>
        <div style="font-size: 10px; text-align: center; margin-top: 8px; color:#6e7a9a;">
            🖱️ Клик по врагу = атака | Клик по себе = восстановление | Меняй класс в бою
        </div>
    </div>
</div>

<script>
    (function(){
        // -------- Игровые параметры (вдохновение Rucoy) ----------
        let player = {
            level: 1,
            xp: 0,
            maxHp: 100,
            hp: 100,
            maxMana: 50,
            mana: 50,
            baseAttack: 18,
            defense: 12,
            className: "knight", // knight, archer, mage
            // бонусы классов
            get attack() {
                if(this.className === "knight") return this.baseAttack + 4;
                if(this.className === "archer") return this.baseAttack + 6;
                if(this.className === "mage") return this.baseAttack + 5;
                return this.baseAttack;
            },
            get manaRegen() {
                if(this.className === "mage") return 8;
                return 3;
            }
        };
        
        // Монстры (спавн 3 видов)
        let monsters = [
            { id: 0, name: "Гоблин", hp: 38, maxHp: 38, attack: 12, defense: 2, xpReward: 28, x: 180, y: 220, size: 32, alive: true, type: "goblin" },
            { id: 1, name: "Скелет", hp: 68, maxHp: 68, attack: 20, defense: 5, xpReward: 55, x: 520, y: 340, size: 36, alive: true, type: "skeleton" },
            { id: 2, name: "Минотавр", hp: 125, maxHp: 125, attack: 30, defense: 9, xpReward: 110, x: 620, y: 110, size: 42, alive: true, type: "minotaur" }
        ];
        
        // Вспомогательные переменные
        let lastLog = "";
        let cooldownAttack = false;
        let cooldownSpell = false;
        let selectedTargetId = null; // для визуального выделения
        
        // DOM элементы
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Обновление интерфейса
        function updateUI() {
            document.getElementById('levelVal').innerText = player.level;
            const classNames = { knight:"Рыцарь", archer:"Лучник", mage:"Маг" };
            document.getElementById('classLabel').innerText = classNames[player.className];
            const hpPercent = (player.hp / player.maxHp) * 100;
            const mpPercent = (player.mana / player.maxMana) * 100;
            document.getElementById('hpFill').style.width = `${hpPercent}%`;
            document.getElementById('mpFill').style.width = `${mpPercent}%`;
            document.getElementById('hpText').innerText = `${Math.floor(player.hp)}/${player.maxHp}`;
            document.getElementById('mpText').innerText = `${Math.floor(player.mana)}/${player.maxMana}`;
            let needXP = Math.floor(100 + (player.level-1) * 35);
            document.getElementById('xpVal').innerText = player.xp;
            document.getElementById('nextXp').innerText = needXP;
            
            // кнопки активного класса
            document.getElementById('classKnight').classList.remove('active-class');
            document.getElementById('classArcher').classList.remove('active-class');
            document.getElementById('classMage').classList.remove('active-class');
            if(player.className === 'knight') document.getElementById('classKnight').classList.add('active-class');
            if(player.className === 'archer') document.getElementById('classArcher').classList.add('active-class');
            if(player.className === 'mage') document.getElementById('classMage').classList.add('active-class');
        }
        
        function addLog(msg) {
            lastLog = msg;
            const logDiv = document.getElementById('logMsg');
            logDiv.innerText = msg;
            setTimeout(() => {
                if(document.getElementById('logMsg').innerText === msg) {
                    // не стираем если новое сообщение не пришло
                }
            }, 2000);
        }
        
        // Проверка уровня и повышение статов (как в Rucoy: +HP, +мана, +атака)
        function checkLevelUp() {
            let needXP = Math.floor(100 + (player.level-1) * 35);
            while(player.xp >= needXP) {
                player.xp -= needXP;
                player.level++;
                // повышение характеристик
                let hpGain = 22;
                let manaGain = 12;
                let attackGain = 4;
                player.maxHp += hpGain;
                player.hp += hpGain;
                player.maxMana += manaGain;
                player.mana += manaGain;
                player.baseAttack += attackGain;
                player.defense += 2;
                addLog(`✨ УРОВЕНЬ ${player.level}! +HP +МАНА +АТАКА ✨`);
                needXP = Math.floor(100 + (player.level-1) * 35);
                updateUI();
            }
            // хп не может быть выше макс
            if(player.hp > player.maxHp) player.hp = player.maxHp;
            if(player.mana > player.maxMana) player.mana = player.maxMana;
            updateUI();
        }
        
        // Расчет урона (формула простая)
        function calculateDamage(attackerAttack, targetDefense) {
            let raw = attackerAttack - targetDefense * 0.6;
            if(raw < 5) raw = 5 + Math.random() * 8;
            let variance = 0.85 + Math.random() * 0.5;
            let final = Math.floor(raw * variance);
            return Math.max(2, final);
        }
        
        // Игрок атакует монстра
        function playerAttackMonster(monster) {
            if(!monster.alive) {
                addLog("Монстр уже повержен!");
                return false;
            }
            if(cooldownAttack) {
                addLog("⚔️ Подождите, атака восстанавливается...");
                return false;
            }
            let dmg = calculateDamage(player.attack, monster.defense);
            monster.hp -= dmg;
            addLog(`⚡ Вы нанесли ${dmg} урона ${monster.name}!`);
            
            cooldownAttack = true;
            setTimeout(() => { cooldownAttack = false; }, 850);
            
            if(monster.hp <= 0) {
                monster.alive = false;
                let rewardXP = monster.xpReward;
                player.xp += rewardXP;
                addLog(`🏆 Убит ${monster.name}! +${rewardXP} XP!`);
                checkLevelUp();
                // воскрешаем монстра через 5 секунд (спавн)
                setTimeout(() => {
                    if(!monster.alive) {
                        monster.hp = monster.maxHp;
                        monster.alive = true;
                        addLog(`🌀 ${monster.name} возродился в мире...`);
                        draw(); // обновить канвас
                    }
                }, 5500);
                draw();
                return true;
            }
            draw();
            return true;
        }
        
        // Монстр контратакует, если игрок его атаковал (реактивная механика)
        function monsterAttackPlayer(monster) {
            if(!monster.alive) return;
            let dmg = calculateDamage(monster.attack, player.defense);
            player.hp -= dmg;
            addLog(`💔 ${monster.name} контратакует! -${dmg} HP`);
            if(player.hp <= 0) {
                player.hp = 0;
                addLog(`💀 ВАС УБИЛИ... возрождение через 3 секунды 💀`);
                updateUI();
                draw();
                // воскрешение игрока (потеря опыта минимальна или без потери, для демо)
                setTimeout(() => {
                    player.hp = player.maxHp;
                    player.mana = player.maxMana;
                    addLog("🌟 Вы возродились в городе! Будьте осторожнее.");
                    updateUI();
                    draw();
                }, 3000);
            }
            updateUI();
            draw();
        }
        
        // Специальная способность (разная для классов)
        function useSpell() {
            if(cooldownSpell) {
                addLog("⏳ Заклинание перезаряжается!");
                return;
            }
            if(player.className === "knight") {
                // рыцарь: усиленная атака + небольшое лечение
                let bonusDmg = 18;
                let found = false;
                for(let m of monsters) {
                    if(m.alive && Math.hypot(400 - m.x, 250 - m.y) < 180) {
                        m.hp -= bonusDmg;
                        addLog(`🛡️ Рыцарский удар! +${bonusDmg} урона ближайшему врагу!`);
                        found = true;
                        if(m.hp <= 0) {
                            m.alive = false;
                            player.xp += m.xpReward;
                            addLog(`💀 ${m.name} пал от священного удара!`);
                            checkLevelUp();
                            setTimeout(() => { if(!m.alive) { m.alive=true; m.hp=m.maxHp; addLog(`⚔️ ${m.name} восстал`); draw();}}, 5000);
                        }
                        break;
                    }
                }
                if(!found) addLog("Рыцарь: рядом нет врагов для удара!");
                player.hp = Math.min(player.maxHp, player.hp + 15);
                addLog(`🛡️ Рыцарь восстанавливает 15 HP`);
            } 
            else if(player.className === "archer") {
                // лучник: двойной выстрел по всем живым
                let totalDmg = 0;
                for(let m of monsters) {
                    if(m.alive) {
                        let d = calculateDamage(player.attack+4, m.defense);
                        m.hp -= d;
                        totalDmg += d;
                        if(m.hp <= 0) {
                            m.alive = false;
                            player.xp += m.xpReward;
                            addLog(`🏹 Лучник убил ${m.name}!`);
                            checkLevelUp();
                            setTimeout(() => { if(!m.alive) { m.alive=true; m.hp=m.maxHp; addLog(`🔄 ${m.name} возвращён`); draw();}}, 5000);
                        }
                    }
                }
                if(totalDmg > 0) addLog(`🏹 Залп стрел: ${totalDmg} урона по врагам!`);
                else addLog("Нет врагов для залпа!");
            } 
            else if(player.className === "mage") {
                // маг: огненный шар + восстановление маны
                let targets = monsters.filter(m => m.alive);
                if(targets.length > 0) {
                    let target = targets[Math.floor(Math.random()*targets.length)];
                    let spellDmg = calculateDamage(player.attack+12, target.defense);
                    target.hp -= spellDmg;
                    addLog(`🔥 Маг: Огненный шар! -${spellDmg} по ${target.name}`);
                    if(target.hp <= 0) {
                        target.alive = false;
                        player.xp += target.xpReward;
                        addLog(`✨ Маг испепелил ${target.name}!`);
                        checkLevelUp();
                        setTimeout(() => { if(!target.alive) { target.alive=true; target.hp=target.maxHp; addLog(`🌙 Возрождение монстра`); draw();}}, 5000);
                    }
                } else addLog("Нет целей для магии!");
                player.mana = Math.min(player.maxMana, player.mana + 20);
                addLog(`💎 Маг восстанавливает 20 маны`);
            }
            cooldownSpell = true;
            setTimeout(() => { cooldownSpell = false; }, 3200);
            updateUI();
            draw();
        }
        
        // Лечение (зелье)
        function heal() {
            let healAmount = Math.floor(player.maxHp * 0.35);
            player.hp = Math.min(player.maxHp, player.hp + healAmount);
            addLog(`💊 Вылечено +${healAmount} HP`);
            updateUI();
            draw();
        }
        
        function restoreMana() {
            let manaAmount = Math.floor(player.maxMana * 0.5);
            player.mana = Math.min(player.maxMana, player.mana + manaAmount);
            addLog(`🔮 Восстановлено +${manaAmount} маны`);
            updateUI();
            draw();
        }
        
        // Пассивная регенерация (раз в 4 сек)
        setInterval(() => {
            if(player.hp < player.maxHp) {
                let regen = Math.floor(player.maxHp * 0.03);
                if(regen < 2) regen = 2;
                player.hp = Math.min(player.maxHp, player.hp + regen);
                updateUI();
                draw();
            }
            let manaReg = player.manaRegen;
            if(player.mana < player.maxMana) {
                player.mana = Math.min(player.maxMana, player.mana + manaReg);
                updateUI();
                draw();
            }
        }, 3800);
        
        // Обработка клика на канвасе (атака по монстру, либо лечение по себе)
        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            
            // сначала ищем монстра
            let clickedMonster = null;
            for(let m of monsters) {
                if(!m.alive) continue;
                let half = m.size/2;
                if(mouseX > m.x - half && mouseX < m.x + half && mouseY > m.y - half && mouseY < m.y + half) {
                    clickedMonster = m;
                    break;
                }
            }
            if(clickedMonster) {
                // атака по монстру
                playerAttackMonster(clickedMonster);
                // Контратака от монстра (если жив)
                if(clickedMonster.alive && player.hp > 0) {
                    monsterAttackPlayer(clickedMonster);
                } else if(!clickedMonster.alive) {
                    // ничего
                }
                updateUI();
            } else {
                // клик по пустому месту -> лечимся (удобно как в мобилках)
                addLog("✨ Щелчок по себе: восстановление (зелье)");
                heal();
            }
        }
        
        // ----- Отрисовка пиксельной RPG графики (стилизация Rucoy) -----
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // фон
            ctx.fillStyle = "#2c3525";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // трава/плитка
            ctx.fillStyle = "#3e4a2f";
            for(let i=0;i<200;i++) ctx.fillRect(i*40%800, (i*23)%500, 18, 18);
            
            // монстры
            monsters.forEach(m => {
                if(!m.alive) return;
                let x = m.x - m.size/2, y = m.y - m.size/2;
                // тень
                ctx.fillStyle = "#1a1919";
                ctx.beginPath();
                ctx.ellipse(m.x+3, m.y+12, m.size/2.2, 8, 0, 0, Math.PI*2);
                ctx.fill();
                // тело монстра
                if(m.type === "goblin") ctx.fillStyle = "#6b8c42";
                else if(m.type === "skeleton") ctx.fillStyle = "#bdb28c";
                else ctx.fillStyle = "#9b5e2c";
                ctx.fillRect(x, y, m.size, m.size);
                ctx.fillStyle = "#000";
                ctx.fillRect(x+5, y+6, 6, 6);
                ctx.fillRect(x+m.size-12, y+6, 6, 6);
                ctx.fillStyle = "#ffaa66";
                ctx.fillRect(x+8, y+m.size-12, m.size-16, 6);
                // полоска HP
                let hpPercent = m.hp/m.maxHp;
                ctx.fillStyle = "#a13333";
                ctx.fillRect(x, y-12, m.size, 5);
                ctx.fillStyle = "#d65c5c";
                ctx.fillRect(x, y-12, m.size*hpPercent, 5);
                ctx.fillStyle = "#fff3cf";
                ctx.font = "bold 14 monospace";
                ctx.fillText(m.name, x+2, y-3);
                // рамка выбранного
                if(selectedTargetId === m.id) {
                    ctx.strokeStyle = "#ffcc44";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x-2, y-2, m.size+4, m.size+4);
                }
            });
            
            // Игрок (рыцарь/лучник/маг стилизован)
            let px = 400, py = 250;
            let pSize = 28;
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#3a6ea5";
            ctx.beginPath();
            ctx.roundRect(px-pSize/2, py-pSize/2, pSize, pSize, 8);
            ctx.fill();
            ctx.fillStyle = "#f9c87a";
            ctx.beginPath();
            ctx.arc(px, py-5, 12, 0, Math.PI*2);
            ctx.fill();
            // шлем/шапка по классу
            if(player.className === "knight") ctx.fillStyle = "#b0a07c";
            else if(player.className === "archer") ctx.fillStyle = "#6f9e4f";
            else ctx.fillStyle = "#a367c2";
            ctx.fillRect(px-12, py-14, 24, 12);
            // оружие
            ctx.fillStyle = "#aabbdd";
            if(player.className === "knight") ctx.fillRect(px+12, py-6, 14, 5);
            if(player.className === "archer") ctx.fillRect(px+14, py-8, 12, 3);
            if(player.className === "mage") {
                ctx.fillStyle = "#ff88aa";
                ctx.beginPath();
                ctx.moveTo(px+16, py-10);
                ctx.lineTo(px+28, py-6);
                ctx.lineTo(px+16, py-2);
                ctx.fill();
            }
            ctx.fillStyle = "#ffffdd";
            ctx.font = "bold 12 monospace";
            ctx.fillText(classMark(), px-18, py-18);
            
            function classMark() {
                if(player.className === "knight") return "⚔️ KNIGHT";
                if(player.className === "archer") return "🏹 ARCHER";
                return "🔮 MAGE";
            }
        }
        
        // округление rect
        if(!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ----- Смена класса (как в Rucoy без потери прогресса)-----
        function setClass(className) {
            player.className = className;
            addLog(`🔄 Смена класса: ${className.toUpperCase()}! Атака и реген изменены.`);
            updateUI();
            draw();
        }
        
        // Инициализация кнопок
        document.getElementById('classKnight').onclick = () => setClass('knight');
        document.getElementById('classArcher').onclick = () => setClass('archer');
        document.getElementById('classMage').onclick = () => setClass('mage');
        document.getElementById('healBtn').onclick = () => heal();
        document.getElementById('manaBtn').onclick = () => restoreMana();
        document.getElementById('spellBtn').onclick = () => useSpell();
        canvas.addEventListener('click', handleCanvasClick);
        
        // первоначальная отрисовка и реген
        updateUI();
        draw();
        setInterval(() => { draw(); }, 100);
        // автообновление статов
    })();
</script>
</body>
</html>
